name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
    # 👇👇👇 核心解药在这里 👇👇👇
    paths-ignore:
      - 'nutrition_images/**'  # 只要是这个文件夹里的变动，绝对不触发构建！
      - '**.jpg'               # 所有的 jpg 图片变动也不触发
      - '**.png'               # 所有的 png 图片变动也不触发
      - 'README.md'            # 改 README 也不触发

  # 允许你手动在 Actions 页面点击按钮来触发构建
  workflow_dispatch:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：新构建来了就取消仍在排队/进行中的旧构建，避免堆积排队
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 单一的部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传整个仓库作为网站内容
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
