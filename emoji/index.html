<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Emoji 拼图 · 图片转 emoji 马赛克</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        [hidden] { display: none !important; }

        :root {
            --text: #1d1d27;
            --text-sub: #5b5b6b;
            --accent: #5b7cff;
            --accent-2: #8a5bff;
            --radius: 24px;
        }

        html, body { margin: 0; min-height: 100%; overflow-x: hidden; }

        body {
            font-family: "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            padding: 0 16px 100px;
            min-height: 100vh;
            background: #F2F2F7;
        }
        /* 固定背景层：用独立的 fixed 元素铺渐变，避开 Safari 上
           background-attachment:fixed + backdrop-filter 产生的残影 bug */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 0% 0%, rgba(200, 220, 255, 0.85), transparent 55%),
                radial-gradient(circle at 100% 0%, rgba(240, 210, 255, 0.7), transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(210, 255, 240, 0.6), transparent 55%),
                #F2F2F7;
        }

        .wrap { max-width: 760px; margin: 0 auto; width: 100%; }

        /* 顶部返回 + 标题 */
        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 4px 20px;
            min-width: 0;
        }
        .back {
            width: 40px; height: 40px;
            flex: 0 0 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            font-size: 22px; line-height: 1;
            color: var(--text);
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 6px 18px -8px rgba(60, 70, 120, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        .titles { min-width: 0; }
        .titles h1 { margin: 0; font-size: 1.5rem; letter-spacing: -0.5px; }
        .titles p { margin: 2px 0 0; font-size: 0.85rem; color: var(--text-sub); }

        /* 实心白卡（不用毛玻璃，彻底避开 Safari backdrop-filter 残影） */
        .glass {
            background: rgba(255, 255, 255, 0.78);
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow:
                0 18px 40px -18px rgba(60, 70, 120, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .card { padding: 18px; margin-bottom: 16px; overflow: hidden; }

        /* 上传投放区 —— 不画任何边框（外层白卡已提供结构，删掉怪框） */
        .drop {
            border-radius: 16px;
            padding: 30px 18px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .drop:active { transform: scale(0.99); }
        .drop.drag { background-color: rgba(91, 124, 255, 0.12); }
        .drop .emoji { font-size: 40px; }
        .drop .big { margin: 10px 0 4px; font-size: 1rem; font-weight: 600; }
        .drop .sub { font-size: 0.82rem; color: var(--text-sub); }
        input[type=file] { display: none; }

        /* 控制面板 */
        .row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 2px;
            border-bottom: 1px solid rgba(120, 120, 140, 0.12);
            min-width: 0;
        }
        .row:last-child { border-bottom: none; }
        .row .label { flex: 0 0 64px; font-size: 0.9rem; font-weight: 600; }
        .row .val { flex: 0 0 40px; text-align: right; font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 600; }

        input[type=range] {
            flex: 1; min-width: 0; -webkit-appearance: none; appearance: none;
            height: 6px; border-radius: 6px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 26px; height: 26px; border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            cursor: pointer;
        }

        /* 分段控件 */
        .seg { display: flex; flex: 1; min-width: 0; background: rgba(120, 120, 140, 0.12); border-radius: 12px; padding: 3px; gap: 3px; }
        .seg button {
            flex: 1; min-width: 0; border: none; background: transparent; cursor: pointer;
            padding: 8px 4px; border-radius: 9px; font-size: 0.82rem; font-weight: 600;
            color: var(--text-sub); font-family: inherit; transition: all 0.15s;
        }
        .seg button.on { background: #fff; color: var(--text); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1); }

        /* 结果预览 */
        .stage { padding: 14px; text-align: center; }
        .stage .hint { color: var(--text-sub); font-size: 0.85rem; padding: 30px 0; }
        #outCanvas {
            max-width: 100%; height: auto; border-radius: 14px;
            box-shadow: 0 10px 30px -12px rgba(0, 0, 0, 0.25);
            display: none;
        }
        .checker {
            background-image:
                linear-gradient(45deg, #e9e9ef 25%, transparent 25%),
                linear-gradient(-45deg, #e9e9ef 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e9e9ef 75%),
                linear-gradient(-45deg, transparent 75%, #e9e9ef 75%);
            background-size: 18px 18px;
            background-position: 0 0, 0 9px, 9px -9px, -9px 0;
        }

        /* 底部操作栏 */
        .actions {
            position: fixed; left: 0; right: 0; bottom: 0;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(242, 242, 247, 0.92), rgba(242, 242, 247, 0));
            z-index: 20;
        }
        .actions .inner { max-width: 760px; margin: 0 auto; width: 100%; display: flex; gap: 12px; }

        /* 液态玻璃按钮 */
        /* 薄磨砂玻璃胶囊：半透明 + 顶部亮边 + 底部厚度 + 浮起投影 */
        .btn {
            flex: 1; min-width: 0; border: none; cursor: pointer; font-family: inherit;
            padding: 16px; border-radius: 999px; font-size: 1rem; font-weight: 700;
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            backdrop-filter: blur(12px) saturate(180%);
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn.primary {
            background: rgba(91, 124, 255, 0.6);
            color: #fff;
            box-shadow:
                0 8px 20px -6px rgba(91, 124, 255, 0.5),        /* 浮起 */
                inset 0 1px 1px rgba(255, 255, 255, 0.7),        /* 顶部亮边 */
                inset 0 -6px 12px -8px rgba(30, 20, 90, 0.55);   /* 底部厚度 */
        }
        .btn.ghost {
            background: rgba(255, 255, 255, 0.5);
            color: var(--text);
            box-shadow:
                0 6px 16px -8px rgba(60, 70, 120, 0.25),
                inset 0 1px 1px rgba(255, 255, 255, 0.9),
                inset 0 -6px 12px -8px rgba(90, 100, 140, 0.3);
        }

        .status { text-align: center; font-size: 0.82rem; color: var(--text-sub); min-height: 18px; margin-top: 4px; }
        .hidden { display: none !important; }

        /* 裁剪原图（可选）*/
        .croptoggle { display: block; width: 100%; margin: -4px 0 16px; padding: 13px; border-radius: 16px; border: 1px dashed rgba(120, 130, 200, 0.5); background: rgba(255, 255, 255, 0.5); color: var(--text); font-weight: 600; font-family: inherit; font-size: 0.92rem; cursor: pointer; transition: transform 0.1s; }
        .croptoggle:active { transform: scale(0.99); }
        .croptoggle.active { background: rgba(91, 124, 255, 0.12); border-style: solid; border-color: var(--accent); color: var(--accent); }
        .cardhead { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
        .cardhead span { font-size: 0.78rem; color: var(--text-sub); font-weight: 500; margin-left: 6px; }
        .cropwrap { text-align: center; }
        .cropstage { position: relative; display: inline-block; max-width: 100%; line-height: 0; border-radius: 12px; overflow: hidden; touch-action: none; }
        #cropImg { display: block; max-width: 100%; max-height: 46vh; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; }
        .cropbox { position: absolute; box-sizing: border-box; border: 1.5px solid rgba(255, 255, 255, 0.95); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.42); cursor: move; touch-action: none; }
        .cropbox .hd { position: absolute; width: 24px; height: 24px; box-sizing: border-box; touch-action: none; }
        .cropbox .hd.tl { left: -2px; top: -2px; border-left: 3px solid #fff; border-top: 3px solid #fff; border-top-left-radius: 5px; cursor: nwse-resize; }
        .cropbox .hd.tr { right: -2px; top: -2px; border-right: 3px solid #fff; border-top: 3px solid #fff; border-top-right-radius: 5px; cursor: nesw-resize; }
        .cropbox .hd.bl { left: -2px; bottom: -2px; border-left: 3px solid #fff; border-bottom: 3px solid #fff; border-bottom-left-radius: 5px; cursor: nesw-resize; }
        .cropbox .hd.br { right: -2px; bottom: -2px; border-right: 3px solid #fff; border-bottom: 3px solid #fff; border-bottom-right-radius: 5px; cursor: nwse-resize; }
        .minibtn { display: block; margin: 14px auto 0; padding: 9px 18px; border-radius: 999px; border: none; background: rgba(120, 120, 140, 0.16); color: var(--text); font-weight: 600; font-family: inherit; cursor: pointer; font-size: 0.85rem; }
        .minibtn:active { transform: scale(0.97); }

        /* 结果可点击放大 */
        #outCanvas { cursor: zoom-in; }
        .zoomcap { margin-top: 10px; font-size: 0.8rem; color: var(--text-sub); }

        /* 放大预览 */
        .lightbox { position: fixed; inset: 0; z-index: 50; background: rgba(10, 12, 20, 0.92); }
        .lbstage { position: absolute; inset: 0; overflow: hidden; touch-action: none; }
        #lbImg { position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; cursor: grab; }
        #lbImg.grabbing { cursor: grabbing; }
        .lbclose { position: absolute; top: calc(12px + env(safe-area-inset-top)); right: 16px; z-index: 2; width: 42px; height: 42px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.16); color: #fff; font-size: 19px; cursor: pointer; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); }
        .lbhint { position: absolute; bottom: calc(16px + env(safe-area-inset-bottom)); left: 0; right: 0; text-align: center; color: rgba(255, 255, 255, 0.7); font-size: 0.8rem; pointer-events: none; }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="topbar">
            <a class="back" href="/" aria-label="返回首页">‹</a>
            <div class="titles">
                <h1>Emoji 拼图</h1>
                <p>把照片用 iOS emoji 拼出来</p>
            </div>
        </div>

        <!-- 上传 -->
        <div class="card glass">
            <label class="drop" id="drop" for="file">
                <div class="emoji">🖼️</div>
                <div class="big">点这里选图片</div>
                <div class="sub">或拖拽 / 粘贴图片到这里</div>
            </label>
            <input type="file" id="file" accept="image/*">
        </div>

        <!-- 裁剪原图（可选）-->
        <button class="croptoggle" id="cropToggle" hidden>✂️ 裁剪原图（可选）</button>
        <div class="card glass" id="cropCard" hidden>
            <div class="cardhead">裁剪原图<span>拖动方框移动，四角缩放</span></div>
            <div class="cropwrap">
                <div class="cropstage" id="cropStage">
                    <img id="cropImg" alt="原图">
                    <div class="cropbox" id="cropBox">
                        <i class="hd tl" data-h="tl"></i>
                        <i class="hd tr" data-h="tr"></i>
                        <i class="hd bl" data-h="bl"></i>
                        <i class="hd br" data-h="br"></i>
                    </div>
                </div>
            </div>
            <button class="minibtn" id="cropReset">全选整张</button>
        </div>

        <!-- 控制面板 -->
        <div class="card glass" id="panel">
            <div class="row">
                <span class="label">精细度</span>
                <input type="range" id="density" min="24" max="150" value="70">
                <span class="val" id="densityVal">70</span>
            </div>
            <div class="row">
                <span class="label">自由度</span>
                <input type="range" id="loose" min="0" max="100" value="45">
                <span class="val" id="looseVal">45</span>
            </div>
            <div class="row">
                <span class="label">背景</span>
                <div class="seg" id="bgSeg">
                    <button data-bg="white">白底</button>
                    <button data-bg="black">黑底</button>
                    <button data-bg="color" class="on">原图色</button>
                    <button data-bg="transparent">透明</button>
                </div>
            </div>
            <div class="row">
                <span class="label">清晰度</span>
                <div class="seg" id="resSeg">
                    <button data-res="20">标准</button>
                    <button data-res="30" class="on">高清</button>
                    <button data-res="44">超清</button>
                </div>
            </div>
        </div>

        <!-- 预览 -->
        <div class="card glass stage">
            <canvas id="outCanvas"></canvas>
            <div class="hint" id="stageHint">还没有结果，选一张图片就会自动生成 👆</div>
            <div class="zoomcap" id="zoomCap" hidden>点击图片可放大查看</div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <!-- 底部操作 -->
    <div class="actions">
        <div class="inner">
            <button class="btn ghost" id="regenBtn" disabled>重新生成</button>
            <button class="btn primary" id="dlBtn" disabled>保存图片</button>
        </div>
    </div>

    <!-- 放大预览 -->
    <div class="lightbox" id="lightbox" hidden>
        <button class="lbclose" id="lbClose" aria-label="关闭">✕</button>
        <div class="lbstage" id="lbStage">
            <img id="lbImg" alt="放大预览" draggable="false">
        </div>
        <div class="lbhint">滚轮 / 双指缩放 · 双击放大 · 拖动平移</div>
    </div>

    <script>
        // ===== 苹果 emoji 图集参数 =====
        const SHEET_SRC = 'assets/sheet32.png';
        const GRID = 62;      // 62 × 62 网格
        const PITCH = 34;     // 每格间距（32 图 + 1px 边 ×2）
        const CELL = 32;      // 单个 emoji 像素尺寸
        const BORDER = 1;     // 边距
        const COVERAGE_MIN = 0.5; // 不透明像素占比阈值，滤掉稀疏 / 空白格

        // ===== 全局状态 =====
        let sheetImg = null;      // 已加载的图集 Image
        let palette = [];         // [{gx,gy,r,g,b}]
        let sourceImg = null;     // 用户上传的图片
        let opts = { bg: 'color', res: 30, loose: 45 };
        let cropRect = { x: 0, y: 0, w: 1, h: 1 }; // 归一化裁剪范围（相对原图）
        let srcUrl = null, lbUrl = null;
        const clamp = (v, a, b) => v < a ? a : v > b ? b : v;

        const $ = (id) => document.getElementById(id);
        const statusEl = $('status');
        const setStatus = (t) => { statusEl.textContent = t || ''; };

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('图片加载失败: ' + src));
                img.src = src;
            });
        }

        // ===== 从图集算出调色板（只跑一次）=====
        async function buildPalette() {
            setStatus('正在加载 emoji 素材…');
            sheetImg = await loadImage(SHEET_SRC);
            const c = document.createElement('canvas');
            c.width = sheetImg.width;
            c.height = sheetImg.height;
            const cx = c.getContext('2d', { willReadFrequently: true });
            cx.drawImage(sheetImg, 0, 0);

            let data;
            try {
                data = cx.getImageData(0, 0, c.width, c.height).data;
            } catch (e) {
                throw new Error('无法读取素材像素，请通过本地服务器打开（见说明）');
            }

            const W = c.width;
            const built = [];
            for (let gy = 0; gy < GRID; gy++) {
                for (let gx = 0; gx < GRID; gx++) {
                    const ox = gx * PITCH + BORDER;
                    const oy = gy * PITCH + BORDER;
                    let r = 0, g = 0, b = 0, opaque = 0;
                    for (let y = 0; y < CELL; y++) {
                        let idx = ((oy + y) * W + ox) * 4;
                        for (let x = 0; x < CELL; x++, idx += 4) {
                            if (data[idx + 3] > 128) {
                                r += data[idx];
                                g += data[idx + 1];
                                b += data[idx + 2];
                                opaque++;
                            }
                        }
                    }
                    if (opaque > 0 && opaque / (CELL * CELL) >= COVERAGE_MIN) {
                        built.push({ gx, gy, r: r / opaque, g: g / opaque, b: b / opaque });
                    }
                }
            }
            palette = built;
            setStatus(`已就绪 · ${palette.length} 个 emoji 可用`);
        }

        // ===== 颜色距离（redmean，感知更准）=====
        function nearest(r, g, b) {
            let best = null, bestD = Infinity;
            for (let i = 0; i < palette.length; i++) {
                const p = palette[i];
                const rm = (r + p.r) * 0.5;
                const dr = r - p.r, dg = g - p.g, db = b - p.b;
                const d = (2 + rm / 256) * dr * dr + 4 * dg * dg + (2 + (255 - rm) / 256) * db * db;
                if (d < bestD) { bestD = d; best = p; }
            }
            return best;
        }

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = (Math.random() * (i + 1)) | 0;
                const t = a[i]; a[i] = a[j]; a[j] = t;
            }
        }

        // ===== 生成拼贴 =====
        function generate() {
            if (!sourceImg || !palette.length) return;
            const t0 = performance.now();

            // 裁剪后的原图子区域（默认整张）
            const sx0 = Math.round(cropRect.x * sourceImg.width);
            const sy0 = Math.round(cropRect.y * sourceImg.height);
            const sw = Math.max(1, Math.round(cropRect.w * sourceImg.width));
            const sh = Math.max(1, Math.round(cropRect.h * sourceImg.height));

            const cols = parseInt($('density').value, 10);
            const rows = Math.max(1, Math.round(cols * sh / sw));

            // 把（裁剪后的）原图降采样成 cols × rows，每个像素 = 一处的目标色
            const sc = document.createElement('canvas');
            sc.width = cols; sc.height = rows;
            const scx = sc.getContext('2d', { willReadFrequently: true });
            scx.drawImage(sourceImg, sx0, sy0, sw, sh, 0, 0, cols, rows);
            const sd = scx.getImageData(0, 0, cols, rows).data;

            const TILE = opts.res;
            const out = $('outCanvas');
            out.width = cols * TILE;
            out.height = rows * TILE;
            const ocx = out.getContext('2d');

            if (opts.bg === 'white') { ocx.fillStyle = '#fff'; ocx.fillRect(0, 0, out.width, out.height); }
            else if (opts.bg === 'black') { ocx.fillStyle = '#000'; ocx.fillRect(0, 0, out.width, out.height); }

            // 自由度：控制随机位移 / 旋转 / 大小的强度（emoji 选色不变，只有摆放随机）
            const L = opts.loose / 100;
            const idxOf = (x, y) => (y * cols + x) * 4;
            const jitter = TILE * L * 0.55;      // 位置抖动上限
            const maxRot = L * 0.5;              // 旋转上限（弧度，约 29°）
            const baseSize = TILE * (1.18 + L * 0.22); // 放大到略大于格子，交错叠放不留缝
            const scaleVar = L * 0.5;            // 大小随机幅度

            // 原图色打底（先铺满，否则会盖住已放的 emoji）
            if (opts.bg === 'color') {
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        const i = idxOf(x, y);
                        ocx.fillStyle = `rgb(${sd[i]},${sd[i + 1]},${sd[i + 2]})`;
                        ocx.fillRect(x * TILE, y * TILE, TILE, TILE);
                    }
                }
            }

            // 放置点：主格点 + 半格错位点（格角）交错，数量翻倍、叠放填满缝隙
            const half = TILE / 2;
            const pts = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    pts.push([x * TILE + half, y * TILE + half]); // 主格点
                    pts.push([x * TILE + TILE, y * TILE + TILE]); // 错位点（四格公共角）
                }
            }
            shuffle(pts);

            // 按画布坐标采样对应格子的颜色
            const sampleAt = (px, py) => {
                let sx = (px / TILE) | 0; if (sx < 0) sx = 0; else if (sx >= cols) sx = cols - 1;
                let sy = (py / TILE) | 0; if (sy < 0) sy = 0; else if (sy >= rows) sy = rows - 1;
                return (sy * cols + sx) * 4;
            };

            const cache = new Map();
            for (let n = 0; n < pts.length; n++) {
                let cx = pts[n][0], cy = pts[n][1];
                const i = sampleAt(cx, cy);
                if (sd[i + 3] < 20 && opts.bg === 'transparent') continue;
                const r = sd[i], g = sd[i + 1], b = sd[i + 2];
                const key = ((r >> 3) << 10) | ((g >> 3) << 5) | (b >> 3);
                let pe = cache.get(key);
                if (pe === undefined) { pe = nearest(r, g, b); cache.set(key, pe); }

                if (L > 0) {
                    cx += (Math.random() * 2 - 1) * jitter;
                    cy += (Math.random() * 2 - 1) * jitter;
                }
                const size = baseSize * (1 + (Math.random() * 2 - 1) * scaleVar);
                const rot = L > 0 ? (Math.random() * 2 - 1) * maxRot : 0;

                const sx = pe.gx * PITCH + BORDER, sy = pe.gy * PITCH + BORDER;
                if (rot === 0) {
                    ocx.drawImage(sheetImg, sx, sy, CELL, CELL, cx - size / 2, cy - size / 2, size, size);
                } else {
                    ocx.save();
                    ocx.translate(cx, cy);
                    ocx.rotate(rot);
                    ocx.drawImage(sheetImg, sx, sy, CELL, CELL, -size / 2, -size / 2, size, size);
                    ocx.restore();
                }
            }

            out.classList.toggle('checker', opts.bg === 'transparent');
            out.style.display = 'block';
            $('stageHint').classList.add('hidden');
            $('dlBtn').disabled = false;
            $('regenBtn').disabled = false;
            $('zoomCap').hidden = false;
            const ms = Math.round(performance.now() - t0);
            setStatus(`${cols} × ${rows} · ${out.width}×${out.height}px · ${ms}ms`);
        }

        // ===== 载入用户图片 =====
        async function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) { setStatus('请选择图片文件'); return; }
            const url = URL.createObjectURL(file);
            try {
                const img = await loadImage(url);
                if (srcUrl) URL.revokeObjectURL(srcUrl);
                srcUrl = url;
                sourceImg = img;
                cropRect = { x: 0, y: 0, w: 1, h: 1 };
                setupCrop(url);
                generate();
            } catch (e) {
                URL.revokeObjectURL(url);
                setStatus(e.message);
            }
        }

        // ===== 裁剪原图（可选）=====
        function layoutCropBox() {
            const b = $('cropBox');
            b.style.left = (cropRect.x * 100) + '%';
            b.style.top = (cropRect.y * 100) + '%';
            b.style.width = (cropRect.w * 100) + '%';
            b.style.height = (cropRect.h * 100) + '%';
        }
        function setupCrop(url) {
            $('cropImg').src = url;
            $('cropToggle').hidden = false;
            $('cropToggle').classList.remove('active');
            $('cropToggle').textContent = '✂️ 裁剪原图（可选）';
            $('cropCard').hidden = true;
            layoutCropBox();
        }
        $('cropToggle').addEventListener('click', () => {
            const show = $('cropCard').hidden;
            $('cropCard').hidden = !show;
            $('cropToggle').classList.toggle('active', show);
            $('cropToggle').textContent = show ? '✓ 完成裁剪' : '✂️ 裁剪原图（可选）';
            if (show) layoutCropBox();
        });

        let cropDrag = null;
        function cropDown(e, mode) {
            e.preventDefault(); e.stopPropagation();
            const rect = $('cropStage').getBoundingClientRect();
            cropDrag = { mode, rect, sx: e.clientX, sy: e.clientY, orig: { ...cropRect } };
            window.addEventListener('pointermove', cropMove);
            window.addEventListener('pointerup', cropUp);
        }
        function cropMove(e) {
            if (!cropDrag) return;
            const { mode, rect, sx, sy, orig } = cropDrag;
            const dx = (e.clientX - sx) / rect.width;
            const dy = (e.clientY - sy) / rect.height;
            const MIN = 0.06;
            let x = orig.x, y = orig.y, w = orig.w, h = orig.h;
            if (mode === 'move') {
                x = clamp(orig.x + dx, 0, 1 - w);
                y = clamp(orig.y + dy, 0, 1 - h);
            } else {
                let x1 = orig.x, y1 = orig.y, x2 = orig.x + orig.w, y2 = orig.y + orig.h;
                if (mode.includes('l')) x1 = clamp(orig.x + dx, 0, x2 - MIN);
                if (mode.includes('r')) x2 = clamp(x2 + dx, x1 + MIN, 1);
                if (mode.includes('t')) y1 = clamp(orig.y + dy, 0, y2 - MIN);
                if (mode.includes('b')) y2 = clamp(y2 + dy, y1 + MIN, 1);
                x = x1; y = y1; w = x2 - x1; h = y2 - y1;
            }
            cropRect = { x, y, w, h };
            layoutCropBox();
        }
        function cropUp() {
            if (!cropDrag) return;
            cropDrag = null;
            window.removeEventListener('pointermove', cropMove);
            window.removeEventListener('pointerup', cropUp);
            if (sourceImg) generate();
        }
        $('cropBox').addEventListener('pointerdown', (e) => cropDown(e, 'move'));
        document.querySelectorAll('.cropbox .hd').forEach((h) => {
            h.addEventListener('pointerdown', (e) => cropDown(e, h.dataset.h));
        });
        $('cropReset').addEventListener('click', () => {
            cropRect = { x: 0, y: 0, w: 1, h: 1 };
            layoutCropBox();
            if (sourceImg) generate();
        });

        // ===== 放大预览（缩放 / 平移）=====
        let lbScale = 1, lbTx = 0, lbTy = 0, lbMin = 1, lbNatW = 0, lbNatH = 0;
        const lbPtrs = new Map();
        let pinch = null;
        const applyLb = () => { $('lbImg').style.transform = `translate(${lbTx}px,${lbTy}px) scale(${lbScale})`; };
        function fitLb() {
            const st = $('lbStage').getBoundingClientRect();
            lbMin = Math.min(st.width / lbNatW, st.height / lbNatH) || 1;
            lbScale = lbMin;
            lbTx = (st.width - lbNatW * lbScale) / 2;
            lbTy = (st.height - lbNatH * lbScale) / 2;
            applyLb();
        }
        function zoomAt(cx, cy, factor) {
            const ns = clamp(lbScale * factor, lbMin, lbMin * 14);
            lbTx = cx - (cx - lbTx) * (ns / lbScale);
            lbTy = cy - (cy - lbTy) * (ns / lbScale);
            lbScale = ns;
            applyLb();
        }
        function openLightbox() {
            const out = $('outCanvas');
            if (!out.width) return;
            out.toBlob((blob) => {
                if (lbUrl) URL.revokeObjectURL(lbUrl);
                lbUrl = URL.createObjectURL(blob);
                const img = $('lbImg');
                img.onload = () => { lbNatW = img.naturalWidth; lbNatH = img.naturalHeight; fitLb(); };
                img.src = lbUrl;
                $('lightbox').hidden = false;
                document.body.style.overflow = 'hidden';
            }, 'image/png');
        }
        function closeLightbox() {
            $('lightbox').hidden = true;
            document.body.style.overflow = '';
        }
        $('outCanvas').addEventListener('click', openLightbox);
        $('lbClose').addEventListener('click', closeLightbox);
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
        $('lbStage').addEventListener('wheel', (e) => {
            e.preventDefault();
            const st = $('lbStage').getBoundingClientRect();
            zoomAt(e.clientX - st.left, e.clientY - st.top, e.deltaY < 0 ? 1.12 : 1 / 1.12);
        }, { passive: false });
        $('lbStage').addEventListener('dblclick', (e) => {
            const st = $('lbStage').getBoundingClientRect();
            if (lbScale > lbMin * 1.5) fitLb();
            else zoomAt(e.clientX - st.left, e.clientY - st.top, (lbMin * 3) / lbScale);
        });
        $('lbStage').addEventListener('pointerdown', (e) => {
            $('lbStage').setPointerCapture(e.pointerId);
            lbPtrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
            if (lbPtrs.size === 2) {
                const [a, b] = [...lbPtrs.values()];
                pinch = { dist: Math.hypot(a.x - b.x, a.y - b.y), scale: lbScale };
            }
            $('lbImg').classList.add('grabbing');
        });
        $('lbStage').addEventListener('pointermove', (e) => {
            if (!lbPtrs.has(e.pointerId)) return;
            const prev = lbPtrs.get(e.pointerId);
            const st = $('lbStage').getBoundingClientRect();
            if (lbPtrs.size >= 2 && pinch) {
                lbPtrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
                const [a, b] = [...lbPtrs.values()];
                const dist = Math.hypot(a.x - b.x, a.y - b.y);
                const midx = (a.x + b.x) / 2 - st.left, midy = (a.y + b.y) / 2 - st.top;
                const target = clamp(pinch.scale * (dist / pinch.dist), lbMin, lbMin * 14);
                zoomAt(midx, midy, target / lbScale);
            } else {
                lbTx += e.clientX - prev.x;
                lbTy += e.clientY - prev.y;
                lbPtrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
                applyLb();
            }
        });
        function lbUp(e) {
            lbPtrs.delete(e.pointerId);
            if (lbPtrs.size < 2) pinch = null;
            if (lbPtrs.size === 0) $('lbImg').classList.remove('grabbing');
        }
        $('lbStage').addEventListener('pointerup', lbUp);
        $('lbStage').addEventListener('pointercancel', lbUp);
        window.addEventListener('resize', () => { if (!$('lightbox').hidden && lbNatW) fitLb(); });

        // ===== 事件绑定 =====
        const drop = $('drop');
        $('file').addEventListener('change', (e) => handleFile(e.target.files[0]));

        ['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, (e) => {
            e.preventDefault(); drop.classList.add('drag');
        }));
        ['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, (e) => {
            e.preventDefault(); drop.classList.remove('drag');
        }));
        drop.addEventListener('drop', (e) => {
            const f = e.dataTransfer.files && e.dataTransfer.files[0];
            if (f) handleFile(f);
        });

        window.addEventListener('paste', (e) => {
            const items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            for (const it of items) {
                if (it.type.startsWith('image/')) { handleFile(it.getAsFile()); break; }
            }
        });

        // 滑块：拖动实时显示数字，松手才重新生成（避免卡顿）
        function bindSlider(id, valId, key) {
            const el = $(id);
            el.addEventListener('input', () => { $(valId).textContent = el.value; if (key) opts[key] = parseInt(el.value, 10); });
            el.addEventListener('change', () => { if (sourceImg) generate(); });
        }
        bindSlider('density', 'densityVal', null);
        bindSlider('loose', 'looseVal', 'loose');

        // 分段控件通用处理
        function bindSeg(segId, key, cast) {
            $(segId).addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                [...e.currentTarget.children].forEach(b => b.classList.remove('on'));
                btn.classList.add('on');
                opts[key] = cast(btn.dataset[key]);
                if (sourceImg) generate();
            });
        }
        bindSeg('bgSeg', 'bg', (v) => v);
        bindSeg('resSeg', 'res', (v) => parseInt(v, 10));

        $('regenBtn').addEventListener('click', generate);

        $('dlBtn').addEventListener('click', () => {
            $('outCanvas').toBlob((blob) => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'emoji-mosaic.png';
                a.click();
                setTimeout(() => URL.revokeObjectURL(a.href), 1000);
            }, 'image/png');
        });

        // ===== 启动 =====
        buildPalette().catch((e) => setStatus('出错：' + e.message));
    </script>
</body>

</html>
