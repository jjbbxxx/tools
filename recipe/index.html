<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>菜谱</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --ink: #20231f;
            --muted: #6e746d;
            --line: #dfe3dd;
            --canvas: #f4f6f3;
            --surface: #ffffff;
            --accent: #ce4935;
            --accent-dark: #a93625;
            --green: #2f6b4f;
            --gold: #b87619;
            --danger: #b83232;
            --shadow: 0 12px 32px rgba(31, 40, 33, 0.08);
            --radius-panel: 24px;
            --radius-card: 22px;
            --radius-control: 14px;
            --radius-modal: 26px;
        }

        html, body { margin: 0; min-height: 100%; }
        body {
            min-height: 100vh;
            padding: 0 24px calc(72px + env(safe-area-inset-bottom));
            background:
                linear-gradient(135deg, rgba(195, 225, 211, 0.92) 0%, rgba(195, 225, 211, 0) 38%),
                linear-gradient(225deg, rgba(242, 205, 202, 0.82) 0%, rgba(242, 205, 202, 0) 42%),
                linear-gradient(18deg, rgba(218, 226, 244, 0.86) 0%, rgba(218, 226, 244, 0) 48%),
                #edf1ef;
            background-attachment: fixed;
            color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body.modal-open { overflow: hidden; }
        button, input, select, textarea { font: inherit; }
        button { color: inherit; }
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible,
        [role="button"]:focus-visible { outline: 3px solid rgba(206, 73, 53, 0.24); outline-offset: 2px; }

        main { width: min(1120px, 100%); margin: 0 auto; }

        .glass {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.62);
            background: rgba(255, 255, 255, 0.4);
            box-shadow:
                0 14px 38px rgba(40, 52, 44, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.82),
                inset 0 -1px 0 rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(22px) saturate(155%);
            -webkit-backdrop-filter: blur(22px) saturate(155%);
        }
        .glass::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0) 42%);
        }
        .glass > * { position: relative; z-index: 1; }
        @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
            .glass { background: rgba(255, 255, 255, 0.9); }
        }

        .top {
            min-height: 118px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            margin: 22px 0 0;
            padding: 0 20px;
            border-radius: var(--radius-panel);
        }
        .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .brand-mark {
            width: 48px; height: 48px; flex: 0 0 48px;
            display: grid; place-items: center;
            border-radius: 15px;
            background: var(--accent);
            color: #fff;
            font-size: 1.55rem;
            box-shadow: 0 7px 18px rgba(206, 73, 53, 0.2);
        }
        .eyebrow {
            margin: 0 0 3px;
            color: var(--green);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .top h1 { margin: 0; font-size: 1.8rem; line-height: 1.1; }
        .top .sub { margin-top: 5px; color: var(--muted); font-size: 0.88rem; }
        .header-actions { display: flex; align-items: center; gap: 10px; }
        .user-label {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--muted);
            font-size: 0.84rem;
        }
        .icon-btn {
            width: 42px; height: 42px;
            display: grid; place-items: center;
            border: 1px solid var(--line);
            border-radius: var(--radius-control);
            background: rgba(255, 255, 255, 0.42);
            cursor: pointer;
            font-size: 1.05rem;
            transition: border-color 0.16s, transform 0.16s, box-shadow 0.16s;
        }
        .icon-btn:hover { border-color: #bbc2ba; box-shadow: 0 4px 12px rgba(31, 40, 33, 0.07); }
        .icon-btn:active { transform: scale(0.95); }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) 170px auto;
            gap: 10px;
            align-items: center;
            margin-top: 16px;
            padding: 16px;
            border-radius: var(--radius-panel);
        }
        .search-wrap { position: relative; min-width: 0; }
        .search-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--muted); pointer-events: none; font-size: 1.1rem;
        }
        .field, .sort-select {
            width: 100%;
            min-height: 46px;
            border: 1px solid var(--line);
            border-radius: var(--radius-control);
            background: rgba(255, 255, 255, 0.54);
            color: var(--ink);
            outline: none;
            transition: border-color 0.16s, box-shadow 0.16s;
        }
        .field { padding: 11px 13px; margin-bottom: 13px; }
        .search-wrap .field { margin: 0; padding-left: 42px; }
        .field:focus, .sort-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(206, 73, 53, 0.11);
        }
        textarea.field { min-height: 94px; resize: vertical; line-height: 1.55; }
        .sort-select {
            appearance: none;
            padding: 0 36px 0 13px;
            cursor: pointer;
            background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
            background-position: calc(100% - 17px) 20px, calc(100% - 12px) 20px;
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }
        select.field { cursor: pointer; }

        .btn {
            min-height: 42px;
            border: 1px solid transparent;
            border-radius: var(--radius-control);
            padding: 10px 16px;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.16s, border-color 0.16s, transform 0.16s, box-shadow 0.16s;
        }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { cursor: wait; opacity: 0.65; }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 7px 16px rgba(206, 73, 53, 0.18);
        }
        .btn-primary:hover { background: var(--accent-dark); }
        .btn-ghost { background: rgba(255, 255, 255, 0.42); border-color: rgba(255, 255, 255, 0.65); }
        .btn-ghost:hover { border-color: rgba(255, 255, 255, 0.88); background: rgba(255, 255, 255, 0.62); }
        .btn-danger { color: var(--muted); background: transparent; border-color: transparent; box-shadow: none; }
        .btn-danger:hover { color: var(--danger); background: rgba(184, 50, 50, 0.08); }
        .btn-block { width: 100%; }
        body:not(.is-admin) .admin-only { display: none !important; }
        body:not(.is-owner) .owner-only { display: none !important; }
        .btn-sm { min-width: 0 !important; padding: 8px 14px; font-size: 0.85rem; }
        .admins-scroll { padding: 6px 22px 22px; }
        .admins-hint { color: var(--muted); font-size: 0.82rem; margin: 2px 0 10px; }
        .admin-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); }
        .admin-row:last-child { border-bottom: 0; }
        .admin-uname { font-weight: 700; flex: 1; min-width: 0; word-break: break-word; }
        .admin-badge { font-size: 0.72rem; font-weight: 800; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
        .admin-badge.owner { color: var(--accent); background: rgba(206, 73, 53, 0.1); }
        .admin-badge.adm { color: var(--green); background: rgba(74, 122, 74, 0.12); }
        .admins-msg { color: var(--muted); padding: 18px 0; text-align: center; }
        .new-btn { min-height: 46px; white-space: nowrap; }

        .filters {
            grid-column: 1 / -1;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 0 8px;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }
        .chip {
            flex: 0 0 auto;
            min-height: 34px;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 7px 13px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
        }
        .chip:hover { border-color: #b8c0b7; color: var(--ink); }
        .chip.active { background: var(--green); border-color: var(--green); color: #fff; }

        .list-head {
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 2px 0 12px;
        }
        .result-count { color: var(--muted); font-size: 0.86rem; }
        .clear-filter {
            border: 0; background: transparent; color: var(--accent); cursor: pointer;
            padding: 6px 0; font-size: 0.82rem; font-weight: 700;
        }
        .clear-filter[hidden] { display: none; }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }
        .rcard {
            min-width: 0;
            overflow: hidden;
            border-radius: var(--radius-card);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.36);
            backdrop-filter: blur(18px) saturate(150%);
            -webkit-backdrop-filter: blur(18px) saturate(150%);
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
        }
        .rcard:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.86);
            box-shadow: 0 18px 38px rgba(31, 40, 33, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.88);
        }
        .rcard:active { transform: translateY(-1px); }
        .cover-wrap { position: relative; overflow: hidden; background: #e9ede8; }
        .rcard .cover {
            width: 100%; aspect-ratio: 4 / 3;
            object-fit: cover; display: block;
            transition: transform 0.28s;
        }
        .rcard:hover .cover { transform: scale(1.025); }
        .rcard .cover.ph {
            display: grid; place-items: center;
            background: #e8eee9;
            color: var(--green);
            padding: 10px;
            overflow: hidden;
        }
        .ph-emojis {
            display: flex; flex-wrap: wrap;
            align-items: center; justify-content: center;
            gap: 2px 6px;
            line-height: 1.05;
            max-width: 100%;
        }
        .rbody { padding: 15px 16px 17px; }
        .card-category {
            min-height: 18px;
            color: var(--green);
            font-size: 0.72rem;
            font-weight: 800;
        }
        .rtitle {
            margin-top: 5px;
            font-size: 1.08rem;
            line-height: 1.35;
            font-weight: 800;
            word-break: break-word;
        }
        .rmeta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 7px 12px;
            min-height: 21px;
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.78rem;
        }
        .meta-item { display: inline-flex; align-items: center; gap: 5px; }
        .meta-dot { width: 4px; height: 4px; border-radius: 50%; background: #bdc3bc; }

        .state-panel {
            grid-column: 1 / -1;
            min-height: 260px;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--muted);
            border: 1px dashed #cbd1ca;
            border-radius: var(--radius-panel);
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 36px 20px;
        }
        .state-icon { display: block; margin-bottom: 10px; font-size: 2rem; }
        .state-title { color: var(--ink); font-weight: 800; margin-bottom: 5px; }
        .state-copy { font-size: 0.86rem; line-height: 1.6; }
        .state-action { margin-top: 16px; }
        .skeleton-grid { grid-column: 1 / -1; display: contents; }
        .skeleton {
            min-height: 310px;
            border: 1px solid var(--line);
            border-radius: var(--radius-card);
            background: linear-gradient(100deg, #edf0ec 25%, #f8f9f7 40%, #edf0ec 60%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite linear;
        }
        @keyframes shimmer { to { background-position-x: -200%; } }

        .tag {
            display: inline-flex; align-items: center;
            padding: 5px 9px;
            border-radius: 999px;
            background: #eef3ef;
            color: var(--green);
            font-size: 0.74rem;
            font-weight: 700;
        }

        .overlay {
            position: fixed; inset: 0; z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(21, 25, 22, 0.38);
            backdrop-filter: blur(10px) saturate(115%);
            -webkit-backdrop-filter: blur(10px) saturate(115%);
        }
        .overlay.show { display: flex; }
        .modal {
            width: min(720px, 100%);
            max-height: min(90vh, 880px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.76);
            border-radius: var(--radius-modal);
            background: rgba(255, 255, 255, 0.68);
            backdrop-filter: blur(42px) saturate(170%);
            -webkit-backdrop-filter: blur(42px) saturate(170%);
            box-shadow:
                0 28px 80px rgba(15, 21, 17, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        .detail-modal { width: min(760px, 100%); }
        .modal-head {
            min-height: 78px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 18px 24px 14px;
            border-bottom: 0;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .modal-head .icon-btn {
            width: 38px; height: 38px;
            border: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.55);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
        }
        .modal-head .icon-btn:hover { background: rgba(255, 255, 255, 0.78); box-shadow: none; }
        .modal-kicker { color: var(--green); font-size: 0.7rem; font-weight: 800; }
        .modal-head-right { display: flex; align-items: center; gap: 10px; }
        .detail-from { color: var(--muted); font-size: 0.8rem; font-weight: 600; white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
        .modal h2 { margin: 2px 0 0; font-size: 1.32rem; }
        .modal-scroll { overflow-y: auto; overscroll-behavior: contain; scrollbar-width: thin; }
        .form-content { padding: 2px 24px 32px; }
        .form-section { padding: 16px 0 4px; border-bottom: 0; }
        .form-section + .form-section { padding-top: 28px; }
        .section-heading { margin: 0 0 13px; font-size: 0.94rem; }
        .section-heading span { color: var(--muted); font-size: 0.78rem; font-weight: 500; }
        .field-lbl { display: block; margin: 0 0 6px; color: var(--muted); font-size: 0.76rem; font-weight: 700; }
        .modal .field {
            border-color: rgba(255, 255, 255, 0.72);
            background: rgba(255, 255, 255, 0.56);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
        }
        .modal .field:focus {
            border-color: rgba(206, 73, 53, 0.58);
            background: rgba(255, 255, 255, 0.74);
        }
        .row { display: flex; gap: 12px; }
        .col { flex: 1; min-width: 0; }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 13px 20px calc(13px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
        }
        .modal-actions .btn { min-width: 112px; }

        .list-editor { margin-bottom: 10px; }
        .list-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .list-row .field { flex: 1; min-width: 0; margin: 0; }
        .list-row .rm, .step-edit-row .rm, .prep-row .rm, .sauce-row .rm {
            width: 34px; height: 34px; flex: 0 0 34px;
            border: 0;
            border-radius: 50%;
            background: rgba(54, 61, 56, 0.07);
            color: #7e857f;
            cursor: pointer;
            font-size: 0;
            transition: color 0.16s, background 0.16s, transform 0.16s;
        }
        .list-row .rm::before, .step-edit-row .rm::before, .prep-row .rm::before, .sauce-row .rm::before { content: "\00d7"; font-size: 1.2rem; line-height: 1; }
        .list-row .rm:hover, .step-edit-row .rm:hover, .prep-row .rm:hover, .sauce-row .rm:hover { color: var(--danger); background: rgba(184, 50, 50, 0.1); }
        .list-row .rm:active, .step-edit-row .rm:active, .prep-row .rm:active, .sauce-row .rm:active { transform: scale(0.9); }
        .add-row {
            min-height: 34px;
            padding: 6px 4px;
            border: 0;
            background: transparent;
            color: var(--green);
            box-shadow: none;
            font-size: 0.82rem;
        }
        .add-row:hover { background: rgba(47, 107, 79, 0.08); }

        .quick-options {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            min-height: 0;
            margin: -5px 0 13px;
        }
        .quick-options[hidden] { display: none; }
        .quick-choice {
            min-height: 29px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 999px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.32);
            color: var(--muted);
            cursor: pointer;
            font-size: 0.76rem;
            font-weight: 700;
        }
        .quick-choice:hover { color: var(--green); background: rgba(255, 255, 255, 0.6); }
        .quick-choice.active { border-color: rgba(47, 107, 79, 0.35); background: rgba(47, 107, 79, 0.13); color: var(--green); }

        .step-editor { margin-bottom: 8px; }
        .step-edit-row {
            position: relative;
            display: grid;
            grid-template-columns: 32px minmax(0, 1fr) 34px;
            gap: 10px;
            align-items: start;
            margin-bottom: 12px;
        }
        .step-edit-row:not(:last-of-type)::after {
            content: "";
            position: absolute;
            left: 15px;
            top: 35px;
            bottom: -10px;
            width: 2px;
            border-radius: 2px;
            background: rgba(206, 73, 53, 0.16);
        }
        .step-number {
            width: 32px; height: 32px;
            display: grid; place-items: center;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 800;
            box-shadow: 0 5px 12px rgba(206, 73, 53, 0.16);
        }
        .step-field {
            min-height: 72px !important;
            margin: 0 !important;
            resize: vertical;
            line-height: 1.55;
        }
        .step-edit-row .rm { margin-top: 1px; }
        .add-step { margin-left: 42px; }

        .photo-pick { margin-bottom: 8px; }
        .file-btn {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
        .file-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .photo-preview { display: none; position: relative; margin-top: 12px; }
        .photo-preview.show { display: block; }
        .photo-preview img { width: 100%; max-height: 300px; object-fit: cover; display: block; border-radius: 18px; }
        .rmphoto {
            position: absolute; top: 10px; right: 10px;
            min-height: 34px;
            border: 0;
            border-radius: 12px;
            padding: 7px 10px;
            background: rgba(25, 29, 26, 0.78);
            color: #fff;
            cursor: pointer;
            font-size: 0.78rem;
        }

        .detail-scroll { padding: 0 24px 26px; }
        .detail-photo { width: calc(100% + 48px); max-height: 390px; margin: 0 -24px 22px; object-fit: cover; display: block; }
        .detail-title { margin: 0; font-size: 1.75rem; line-height: 1.25; word-break: break-word; }
        .detail-meta { display: flex; flex-wrap: wrap; gap: 8px 16px; margin: 12px 0 0; color: var(--muted); font-size: 0.82rem; }
        .detail-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 16px; }
        .detail-section { padding-top: 24px; margin-top: 22px; border-top: 1px solid var(--line); }
        .sec-label { margin: 0 0 14px; font-size: 1rem; }
        .ing-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 24px; margin: 0; padding: 0; list-style: none; }
        .ing-list li { position: relative; padding-left: 18px; line-height: 1.55; word-break: break-word; }
        .ing-list li::before { content: ""; position: absolute; left: 0; top: 0.64em; width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
        .step-list { margin: 0; padding: 0; list-style: none; counter-reset: step; }
        .step-list li { counter-increment: step; position: relative; min-height: 38px; padding: 2px 0 20px 46px; line-height: 1.65; word-break: break-word; }
        .step-list li::before {
            content: counter(step);
            position: absolute; left: 0; top: 0;
            width: 30px; height: 30px;
            display: grid; place-items: center;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 800;
        }
        .step-list li:not(:last-child)::after { content: ""; position: absolute; left: 14px; top: 34px; bottom: 3px; width: 1px; background: #e4d1cd; }
        .detail-notes { color: var(--muted); line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
        .detail-ops .btn-danger { margin-right: auto; }

        /* 删除气泡确认（贴按钮弹出，替代 confirm）*/
        #popover {
            position: fixed; z-index: 300;
            display: none;
            min-width: 180px; max-width: min(280px, calc(100vw - 24px));
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.76);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            box-shadow: 0 18px 44px rgba(15, 21, 17, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        #popover.show { display: block; }
        .pop-title { padding: 9px 10px 7px; color: var(--muted); font-size: 0.78rem; font-weight: 700; line-height: 1.4; }
        .pop-item { display: block; width: 100%; text-align: left; border: 0; background: transparent; cursor: pointer; padding: 10px; border-radius: 10px; font-size: 0.92rem; font-weight: 600; color: var(--ink); }
        .pop-item:hover, .pop-item:active { background: rgba(255, 255, 255, 0.62); }
        .pop-item.danger { color: var(--danger); }
        .pop-item.cancel { color: var(--muted); font-weight: 500; }

        /* 备菜 / 料汁 编辑器（表单）*/
        .prep-row, .sauce-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .prep-row .field, .sauce-row .field { margin: 0; }
        .prep-row .prep-name, .sauce-row .sauce-name { flex: 0 0 34%; min-width: 92px; }
        .prep-row .prep-action, .sauce-row .sauce-mix { flex: 1; min-width: 0; }

        /* 备菜 / 料汁 清单（详情）*/
        .prep-list, .sauce-list { display: grid; gap: 8px; margin: 0; padding: 0; list-style: none; }
        .prep-list li, .sauce-list li { position: relative; padding-left: 18px; line-height: 1.55; word-break: break-word; }
        .prep-list li::before, .sauce-list li::before { content: ""; position: absolute; left: 0; top: 0.64em; width: 7px; height: 7px; border-radius: 50%; }
        .prep-list li::before { background: var(--gold); }
        .sauce-list li::before { background: var(--accent); }
        .prep-ing, .sauce-name-txt { font-weight: 700; }
        .prep-ing + .prep-act::before, .sauce-name-txt + .sauce-mix-txt::before { content: "·"; margin: 0 6px; color: #c0c6bf; }
        .prep-act, .sauce-mix-txt { color: var(--muted); }
        /* 调料清单（详情，不可勾选）*/
        .seasoning-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 24px; margin: 0; padding: 0; list-style: none; }
        .seasoning-list li { position: relative; padding-left: 18px; line-height: 1.55; word-break: break-word; }
        .seasoning-list li::before { content: ""; position: absolute; left: 0; top: 0.64em; width: 7px; height: 7px; border-radius: 50%; background: #b0b7ac; }

        /* 备菜「选食材」下拉：去原生外观 + 自定义箭头，和 .sort-select 一致的现代感 */
        .prep-row .prep-name {
            appearance: none; -webkit-appearance: none;
            padding-right: 32px;
            cursor: pointer;
            background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
            background-position: calc(100% - 16px) 50%, calc(100% - 11px) 50%;
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }

        /* 做过次数 +/- 控件（详情）*/
        .cook-count { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; padding: 6px 10px 6px 14px; border-radius: 999px; background: rgba(255, 255, 255, 0.5); border: 1px solid var(--line); font-weight: 800; }
        .cook-count .cc-label { color: var(--muted); font-weight: 600; margin-right: 2px; font-size: 0.86rem; }
        .cook-count .cc-unit { color: var(--muted); font-weight: 600; font-size: 0.86rem; }
        .cc-num { min-width: 1.3em; text-align: center; color: var(--accent); font-size: 1.05rem; }
        .cc-btn { width: 28px; height: 28px; flex: 0 0 28px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 50%; background: rgba(255, 255, 255, 0.7); color: var(--ink); cursor: pointer; font-size: 1.05rem; line-height: 1; transition: border-color 0.16s, color 0.16s, transform 0.16s; }
        .cc-btn:hover { border-color: var(--accent); color: var(--accent); }
        .cc-btn:active { transform: scale(0.9); }

        /* 烹饪模式：详情页备菜/料汁/食材/步骤点按勾掉 */
        .cook-hint { color: var(--muted); font-size: 0.72rem; font-weight: 500; }
        .prep-list li, .sauce-list li, .ing-list li, .step-list li { cursor: pointer; transition: color 0.16s, opacity 0.16s; }
        .prep-list li:focus-visible, .sauce-list li:focus-visible, .ing-list li:focus-visible, .step-list li:focus-visible { outline: 3px solid rgba(206, 73, 53, 0.24); outline-offset: 3px; border-radius: 6px; }
        .prep-list li.done, .sauce-list li.done, .ing-list li.done, .step-list li.done { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(110, 116, 109, 0.55); }
        .prep-list li.done .prep-ing, .prep-list li.done .prep-act, .sauce-list li.done .sauce-name-txt, .sauce-list li.done .sauce-mix-txt { color: var(--muted); }
        .prep-list li.done::before, .sauce-list li.done::before, .ing-list li.done::before { background: #c4cabf; }
        .step-list li.done::before { background: #c4cabf; text-decoration: none; }

        .toast {
            position: fixed; left: 50%; bottom: calc(26px + env(safe-area-inset-bottom)); z-index: 200;
            max-width: min(420px, calc(100vw - 32px));
            transform: translateX(-50%) translateY(16px);
            padding: 11px 16px;
            border-radius: var(--radius-control);
            background: #20251f;
            color: #fff;
            font-size: 0.86rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 8px 24px rgba(20, 25, 21, 0.18);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 工具栏按钮组 + 「今天吃什么」入口 */
        .tb-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .spin-open-btn {
            border: 0;
            color: #fff;
            white-space: nowrap;
            background: linear-gradient(120deg, var(--accent), var(--gold));
            box-shadow: 0 7px 16px rgba(206, 73, 53, 0.2);
        }
        .spin-open-btn:hover { filter: brightness(1.05); }

        /* 今天吃什么 转盘弹层 */
        .spin-modal { width: min(560px, 100%); }
        .spin-body { padding: 6px 22px 26px; }
        .spin-scope { display: flex; gap: 8px; overflow-x: auto; padding: 6px 0 10px; scrollbar-width: none; }
        .spin-scope::-webkit-scrollbar { display: none; }
        .spin-scope .chip { flex: 0 0 auto; }
        .spin-scope .chip.tag-chip.active { background: var(--accent); border-color: var(--accent); }
        .spin-scope-hint { min-height: 18px; margin: 0 0 4px; color: var(--muted); font-size: 0.8rem; text-align: center; }

        .wheel-stage { position: relative; width: min(86vw, 420px); aspect-ratio: 1; margin: 6px auto 2px; }
        .wheel-pointer {
            position: absolute; top: -2px; left: 50%; z-index: 6;
            width: 0; height: 0;
            transform: translateX(-50%);
            border-left: 13px solid transparent;
            border-right: 13px solid transparent;
            border-top: 22px solid var(--accent);
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.22));
        }
        .wheel {
            position: absolute; inset: 0;
            border-radius: 50%;
            will-change: transform;
            background:
                radial-gradient(circle at 50% 46%, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.3) 58%, rgba(255, 255, 255, 0.14) 100%);
            box-shadow:
                inset 0 0 0 2px rgba(255, 255, 255, 0.6),
                inset 0 0 0 12px rgba(255, 255, 255, 0.12),
                0 18px 46px rgba(31, 40, 33, 0.16);
        }
        .wheel-hub {
            position: absolute; top: 50%; left: 50%; z-index: 5;
            width: 62px; height: 62px;
            display: grid; place-items: center;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            font-size: 1.55rem;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 6px 16px rgba(31, 40, 33, 0.18), inset 0 1px 0 #fff;
            pointer-events: none;
        }
        .wheel-card {
            position: absolute; top: 50%; left: 50%;
            width: 78px; height: 98px;
            margin: -49px 0 0 -39px;
            pointer-events: none;
            transition: transform 0.62s cubic-bezier(0.22, 1.2, 0.36, 1);
            will-change: transform;
        }
        .wc-inner {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 5px;
            padding: 8px 6px;
            border-radius: 16px;
            text-align: center;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 8px 18px rgba(31, 40, 33, 0.14);
            transition: transform 0.28s, box-shadow 0.28s, border-color 0.28s;
        }
        .wc-emoji { font-size: 1.5rem; line-height: 1; }
        .wc-title {
            max-width: 100%;
            color: var(--ink);
            font-size: 0.66rem;
            font-weight: 800;
            line-height: 1.15;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .wheel-card.win { z-index: 7; }
        .wheel-card.win .wc-inner {
            transform: scale(1.16);
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 12px 30px rgba(206, 73, 53, 0.4);
        }

        .spin-result { margin-top: 8px; text-align: center; }
        .spin-result-label { color: var(--muted); font-size: 0.82rem; font-weight: 700; }
        .spin-result-name { margin-top: 3px; font-size: 1.5rem; font-weight: 800; word-break: break-word; }
        .spin-actions { justify-content: center; }
        .spin-actions .btn { min-width: 128px; }

        @media (max-width: 720px) {
            body { padding-inline: 16px; }
            .top { min-height: 104px; }
            .brand-mark { width: 44px; height: 44px; flex-basis: 44px; }
            .user-label { display: none; }
            .toolbar { grid-template-columns: 1fr auto; padding-top: 18px; }
            .search-wrap { grid-column: 1 / -1; }
            .sort-select { min-width: 0; }
            .recipe-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
            .rbody { padding: 12px; }
            .rtitle { font-size: 0.98rem; }
            .overlay { align-items: flex-end; padding: 0; }
            .modal { max-height: 94dvh; border-radius: 28px 28px 0 0; border-bottom: 0; }
            .form-content { padding-inline: 16px; }
            .modal-head, .modal-actions { padding-inline: 16px; }
            .detail-scroll { padding-inline: 18px; }
            .detail-photo { width: calc(100% + 36px); margin-inline: -18px; }
        }
        @media (max-width: 480px) {
            .top h1 { font-size: 1.55rem; }
            .top .sub { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .recipe-grid { grid-template-columns: 1fr; }
            .rcard { display: grid; grid-template-columns: 128px minmax(0, 1fr); min-height: 128px; }
            .cover-wrap, .rcard .cover { height: 100%; min-height: 128px; aspect-ratio: auto; }
            .rbody { display: flex; flex-direction: column; justify-content: center; }
            .row { flex-direction: column; gap: 0; }
            .ing-list { grid-template-columns: 1fr; }
            .modal-actions .btn { min-width: 0; flex: 1; }
            .detail-ops { flex-wrap: wrap; }
            .detail-ops .btn-danger { margin-right: 0; }
            .step-edit-row { grid-template-columns: 30px minmax(0, 1fr) 34px; gap: 8px; }
            .step-number { width: 30px; height: 30px; }
            .step-edit-row:not(:last-of-type)::after { left: 14px; top: 33px; }
            .add-step { margin-left: 38px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { scroll-behavior: auto !important; animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>

<body>
    <main>
        <header class="top glass lit">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">🍳</div>
                <div>
                    <p class="eyebrow">My kitchen</p>
                    <h1>菜谱</h1>
                    <div class="sub" id="subline">收藏家常菜，随时翻看怎么做</div>
                </div>
            </div>
            <div class="header-actions">
                <span class="user-label" id="userLabel"></span>
                <button class="icon-btn owner-only" id="adminsBtn" onclick="openAdmins()" aria-label="管理员管理" title="管理员管理">👥</button>
                <button class="icon-btn" id="authBtn" aria-label="登录或退出" title="登录">⎋</button>
            </div>
        </header>

        <section class="toolbar glass lit">
            <div class="search-wrap">
                <span class="search-icon" aria-hidden="true">⌕</span>
                <input id="search" class="field" placeholder="搜索菜名、食材或标签" aria-label="搜索菜谱"
                    oninput="onSearch(this.value)">
            </div>
            <select id="sortMode" class="sort-select" aria-label="菜谱排序" onchange="onSort(this.value)">
                <option value="newest">最近添加</option>
                <option value="name">按菜名排序</option>
                <option value="cooked">按次数排序</option>
            </select>
            <div class="tb-actions">
                <button class="btn spin-open-btn new-btn" onclick="openSpin()">🎡 今天吃什么</button>
                <button class="btn btn-primary new-btn admin-only" onclick="openCreate()">＋ 新建菜谱</button>
            </div>
            <div class="filters" id="catChips"></div>
        </section>

        <div class="list-head">
            <div id="resultCount" class="result-count" aria-live="polite"></div>
            <button id="clearFilter" class="clear-filter" onclick="clearFilters()" hidden>清除筛选</button>
        </div>

        <section class="recipe-grid" id="grid" aria-live="polite">
            <div class="skeleton-grid" aria-label="正在加载菜谱">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </section>
    </main>

    <!-- 新建/编辑 表单弹层 -->
    <div id="formModal" class="overlay" aria-hidden="true">
        <section class="modal glass" role="dialog" aria-modal="true" aria-labelledby="formTitle">
            <div class="modal-head">
                <div>
                    <div class="modal-kicker">菜谱编辑</div>
                    <h2 id="formTitle">新建菜谱</h2>
                </div>
                <button class="icon-btn" type="button" onclick="closeForm()" aria-label="关闭">✕</button>
            </div>
            <div class="modal-scroll form-content">
                <section class="form-section">
                    <h3 class="section-heading">基本信息</h3>
                    <div class="row">
                        <div class="col" style="flex:3">
                            <label class="field-lbl" for="fTitle">菜名</label>
                            <input id="fTitle" class="field" placeholder="如 番茄炒蛋" maxlength="100">
                        </div>
                        <div class="col" style="flex:1">
                            <label class="field-lbl" for="fEmoji">图标（可多个）</label>
                            <input id="fEmoji" class="field" placeholder="🍅🥚🔥" maxlength="40">
                        </div>
                    </div>
                    <label class="field-lbl">分类（可多个）</label>
                    <div id="fCategoryChoices" class="quick-options" aria-label="已有分类" hidden></div>
                    <div id="fCategories" class="list-editor"></div>
                </section>

                <section class="form-section">
                    <h3 class="section-heading">封面照片</h3>
                    <div class="photo-pick">
                        <span class="btn btn-ghost file-btn">
                            ＋ 选择照片
                            <input id="fPhotoInput" type="file" accept="image/*" onchange="onPhotoPick(event)">
                        </span>
                        <div id="fPhotoPreview" class="photo-preview">
                            <img id="fPhotoImg" alt="菜谱封面预览">
                            <button type="button" class="rmphoto" onclick="removePhoto()">移除照片</button>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <h3 class="section-heading">标签</h3>
                    <div id="fTagChoices" class="quick-options" aria-label="已有标签" hidden></div>
                    <div id="fTags" class="list-editor"></div>
                </section>

                <section class="form-section">
                    <h3 class="section-heading">食材</h3>
                    <div id="fIngredients" class="list-editor"></div>
                </section>

                <section class="form-section">
                    <h3 class="section-heading">调料 <span>盐、生抽、糖等，详情页不做勾选</span></h3>
                    <div id="fSeasonings" class="list-editor"></div>
                </section>

                <section class="form-section">
                    <h3 class="section-heading">备菜 <span>下锅前的准备，选食材填备法</span></h3>
                    <div id="fPrep" class="list-editor"></div>
                </section>

                <section class="form-section">
                    <h3 class="section-heading">料汁 <span>可选，提前调好的料汁，某步整碗加入</span></h3>
                    <div id="fSauces" class="list-editor"></div>
                </section>

                <section class="form-section">
                    <h3 class="section-heading">烹饪步骤</h3>
                    <div id="fSteps" class="step-editor"></div>
                </section>

                <section class="form-section">
                    <h3 class="section-heading">备注</h3>
                    <textarea id="fNotes" class="field" placeholder="选填，如 小贴士、口味调整" maxlength="500"></textarea>
                </section>
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" type="button" onclick="closeForm()">取消</button>
                <button id="saveBtn" class="btn btn-primary" type="button" onclick="saveRecipe()">保存菜谱</button>
            </div>
        </section>
    </div>

    <!-- 详情弹层 -->
    <div id="detailModal" class="overlay" aria-hidden="true">
        <section class="modal detail-modal glass" role="dialog" aria-modal="true" aria-label="菜谱详情">
            <div class="modal-head">
                <div class="modal-kicker">菜谱详情</div>
                <div class="modal-head-right">
                    <span id="detailFrom" class="detail-from"></span>
                    <button class="icon-btn" type="button" onclick="closeDetail()" aria-label="关闭">✕</button>
                </div>
            </div>
            <div id="detailBody" class="modal-scroll detail-scroll"></div>
            <div class="modal-actions detail-ops">
                <button class="btn btn-danger admin-only" id="detailDelete">删除菜谱</button>
                <button class="btn btn-ghost admin-only" id="detailEdit">编辑</button>
                <button class="btn btn-primary" onclick="closeDetail()">完成</button>
            </div>
        </section>
    </div>

    <!-- 今天吃什么 转盘 -->
    <div id="spinModal" class="overlay" aria-hidden="true">
        <section class="modal spin-modal glass" role="dialog" aria-modal="true" aria-labelledby="spinTitle">
            <div class="modal-head">
                <div>
                    <div class="modal-kicker">来点灵感</div>
                    <h2 id="spinTitle">今天吃什么？！</h2>
                </div>
                <button class="icon-btn" type="button" onclick="closeSpin()" aria-label="关闭">✕</button>
            </div>
            <div class="modal-scroll spin-body">
                <div class="spin-scope" id="spinScope" aria-label="选择范围"></div>
                <div class="spin-scope-hint" id="spinScopeHint" aria-live="polite"></div>
                <div class="wheel-stage" id="wheelStage">
                    <div class="wheel-pointer" aria-hidden="true"></div>
                    <div class="wheel" id="wheel"></div>
                    <div class="wheel-hub" aria-hidden="true">🍽</div>
                </div>
                <div class="spin-result" id="spinResult" aria-live="polite" hidden>
                    <div class="spin-result-label">今天就吃</div>
                    <div class="spin-result-name" id="spinResultName"></div>
                </div>
            </div>
            <div class="modal-actions spin-actions">
                <button class="btn btn-ghost" type="button" id="spinAgainBtn" onclick="spinAgain()" hidden>再转一次</button>
                <button class="btn btn-primary" type="button" id="spinOpenBtn" onclick="spinOpenWinner()" hidden>看看怎么做</button>
                <button class="btn btn-primary" type="button" id="spinActionBtn" onclick="spinAction()">开始转 🎡</button>
            </div>
        </section>
    </div>

    <div id="adminsModal" class="overlay" aria-hidden="true">
        <section class="modal glass" role="dialog" aria-modal="true" aria-label="管理员管理">
            <div class="modal-head">
                <div class="modal-kicker">管理员管理</div>
                <button class="icon-btn" type="button" onclick="closeAdmins()" aria-label="关闭">✕</button>
            </div>
            <div id="adminsBody" class="modal-scroll admins-scroll"></div>
        </section>
    </div>

    <div id="popover"></div>
    <div id="toast" class="toast"></div>

    <script>
        // --- 统一账号（同域名共享）---
        const API = 'https://api.gimago.cn';
        const TOKEN_KEY = 'gimago_token';
        const USER_KEY = 'gimago_user';
        const store = {
            get token() { return localStorage.getItem(TOKEN_KEY) || ''; },
            get user() { return localStorage.getItem(USER_KEY) || ''; },
        };
        function gotoLogin() {
            location.href = '/login?next=' + encodeURIComponent(location.pathname);
        }
        function logout() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
            gotoLogin();
        }

        let recipes = [];
        let catFilter = '';       // '' = 全部
        let searchQ = '';
        let sortMode = 'newest';
        let loading = true;
        let loadError = '';
        let isAdmin = false;      // 管理员：能增删改（自己的）
        let isOwner = false;      // 所有者(jbx)：能操作所有菜
        let isSaving = false;
        let editingId = null;     // null = 新建
        let formPhoto = '';       // 已在服务器上的路径，或 ''
        let pendingPhoto = null;  // { base64, mime } 已选未上传

        // --- API 封装（所有菜谱数据走 /api/recipe）---
        async function api(method, path, body) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 12000);
            try {
                const res = await fetch(API + path, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + store.token,
                    },
                    body: body ? JSON.stringify(body) : undefined,
                    signal: controller.signal,
                });
                if (res.status === 401) { logout(); throw new Error('未登录'); }
                if (!res.ok) {
                    let msg = res.status;
                    try { msg = (await res.json()).error || msg; } catch (e) {}
                    throw new Error(msg);
                }
                return res.status === 204 ? null : res.json();
            } catch (e) {
                if (e.name === 'AbortError') throw new Error('连接超时，请检查服务后重试');
                throw e;
            } finally {
                clearTimeout(timer);
            }
        }

        function esc(s) {
            return String(s).replace(/[&<>"']/g, c =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        // --- 加载 ---
        async function load() {
            loading = true;
            loadError = '';
            render();
            try {
                recipes = await api('GET', '/api/recipe/items');
                renderChips();
                const categoryCount = new Set(recipes.flatMap(r => r.categories || []).filter(Boolean)).size;
                document.getElementById('subline').textContent = recipes.length
                    ? `${recipes.length} 道收藏 · ${categoryCount} 个分类`
                    : '收藏家常菜，随时翻看怎么做';
            } catch (e) {
                if (e.message !== '未登录') loadError = e.message || '加载失败';
            } finally {
                loading = false;
                render();
            }
        }

        function renderChips() {
            const cats = [...new Set(recipes.flatMap(r => r.categories || []).filter(Boolean))]
                .sort((a, b) => a.localeCompare(b, 'zh-CN'));
            const el = document.getElementById('catChips');
            el.replaceChildren();
            [['', '全部'], ...cats.map(c => [c, c])].forEach(([value, label]) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'chip' + (catFilter === value ? ' active' : '');
                button.textContent = label;
                button.setAttribute('aria-pressed', catFilter === value ? 'true' : 'false');
                button.addEventListener('click', () => setCat(value));
                el.appendChild(button);
            });
        }
        function setCat(v) { catFilter = v; renderChips(); render(); }
        function onSearch(v) { searchQ = v.trim().toLowerCase(); render(); }
        function onSort(v) { sortMode = v; render(); }
        function clearFilters() {
            catFilter = '';
            searchQ = '';
            document.getElementById('search').value = '';
            renderChips();
            render();
        }

        function visible() {
            const list = recipes.filter(r => {
                if (catFilter && !(r.categories || []).includes(catFilter)) return false;
                if (!searchQ) return true;
                const hay = [r.title, ...(r.categories || []), ...(r.tags || []), ...(r.ingredients || []), ...(r.seasonings || []),
                    ...(r.prep || []).flatMap(p => [p.name, p.action]),
                    ...(r.sauces || []).flatMap(s => [s.name, s.mix])]
                    .join(' ').toLowerCase();
                return hay.includes(searchQ);
            });
            if (sortMode === 'name') return list.sort((a, b) => a.title.localeCompare(b.title, 'zh-CN'));
            if (sortMode === 'cooked') return list.sort((a, b) => (b.cook_count || 0) - (a.cook_count || 0) || String(b.created_at || '').localeCompare(String(a.created_at || '')));
            return list.sort((a, b) => String(b.created_at || '').localeCompare(String(a.created_at || '')));
        }

        function recipeMeta(r) {
            const tags = [];
            if (r.cook_count) tags.push(`<span class="meta-item">做过 ${r.cook_count} 次</span>`);
            if ((r.steps || []).length) tags.push(`<span class="meta-item">${r.steps.length} 个步骤</span>`);
            if ((r.ingredients || []).length) tags.push(`<span class="meta-item">${r.ingredients.length} 种食材</span>`);
            return tags;
        }

        // 无封面时的表情占位：拆成单个 emoji，按数量自适应字号并居中换行，任意数量都不溢出
        function splitEmojis(str) {
            const s = String(str || '').trim();
            if (!s) return [];
            if (typeof Intl !== 'undefined' && Intl.Segmenter) {
                return [...new Intl.Segmenter().segment(s)].map(x => x.segment).filter(x => x.trim());
            }
            return [...s].filter(x => x.trim());
        }
        function emojiCoverHTML(emojiStr) {
            const glyphs = splitEmojis(emojiStr);
            const list = glyphs.length ? glyphs : ['🍽'];
            const size = list.length <= 1 ? 3.4 : list.length <= 2 ? 2.9 : list.length <= 4 ? 2.3 : list.length <= 6 ? 1.9 : 1.5;
            return `<div class="ph-emojis" style="font-size:${size}rem">${list.map(g => `<span>${esc(g)}</span>`).join('')}</div>`;
        }
        function rcardHTML(r) {
            const cover = r.photo
                ? `<img class="cover" src="${API + r.photo}" loading="lazy" alt="${esc(r.title)}">`
                : `<div class="cover ph">${emojiCoverHTML(r.emoji)}</div>`;
            const cardMeta = recipeMeta(r);
            return `
                <article class="rcard glass" data-recipe-id="${Number(r.id)}" role="button" tabindex="0"
                    aria-label="查看菜谱：${esc(r.title)}">
                    <div class="cover-wrap">
                        ${cover}
                    </div>
                    <div class="rbody">
                        <div class="card-category">${esc((r.categories || []).join(' · ') || '未分类')}</div>
                        <div class="rtitle">${r.emoji ? esc(r.emoji) + ' ' : ''}${esc(r.title)}</div>
                        <div class="rmeta">${cardMeta.join('<span class="meta-dot"></span>')}</div>
                    </div>
                </article>`;
        }

        function render() {
            const el = document.getElementById('grid');
            const count = document.getElementById('resultCount');
            const clear = document.getElementById('clearFilter');
            clear.hidden = !catFilter && !searchQ;
            if (loading) {
                count.textContent = '正在整理菜谱…';
                el.innerHTML = '<div class="skeleton-grid" aria-label="正在加载菜谱">' +
                    '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>';
                return;
            }
            if (loadError) {
                count.textContent = '暂时无法读取菜谱';
                el.innerHTML = `<div class="state-panel"><div><span class="state-icon">↻</span>
                    <div class="state-title">菜谱加载失败</div>
                    <div class="state-copy">${esc(loadError)}</div>
                    <button class="btn btn-primary state-action" onclick="load()">重新加载</button></div></div>`;
                return;
            }
            const list = visible();
            count.textContent = (catFilter || searchQ) ? `找到 ${list.length} 道菜` : `共 ${recipes.length} 道菜`;
            if (!list.length) {
                el.innerHTML = recipes.length
                    ? '<div class="state-panel"><div><span class="state-icon">⌕</span><div class="state-title">没有匹配的菜谱</div><div class="state-copy">换个关键词或清除筛选后再看看</div></div></div>'
                    : '<div class="state-panel"><div><span class="state-icon">🍲</span><div class="state-title">还没有菜谱</div><div class="state-copy">把第一道常做的菜收藏进来</div><button class="btn btn-primary state-action admin-only" onclick="openCreate()">新建菜谱</button></div></div>';
                return;
            }
            el.innerHTML = list.map(rcardHTML).join('');
        }

        // --- 清单编辑器（食材 / 步骤 / 标签共用）---
        function rowHTML(val) {
            return `<div class="list-row">
                <input class="field" value="${esc(val)}">
                <button type="button" class="rm" onclick="removeRow(this)" aria-label="删除这一行" title="删除这一行">✕</button>
            </div>`;
        }
        function renderList(containerId, items) {
            const el = document.getElementById(containerId);
            const rows = (items && items.length ? items : ['']).map(rowHTML).join('');
            el.innerHTML = rows +
                `<button type="button" class="btn btn-ghost add-row" onclick="addRow('${containerId}')">＋ 添加一行</button>`;
        }
        function addRow(containerId) {
            const el = document.getElementById(containerId);
            const btn = el.querySelector('.add-row');
            btn.insertAdjacentHTML('beforebegin', rowHTML(''));
            const inputs = el.querySelectorAll('.list-row .field');
            inputs[inputs.length - 1].focus();
        }
        function removeRow(btn) {
            const inChoice = btn.closest('#fTags, #fCategories');
            btn.closest('.list-row').remove();
            if (inChoice) renderQuickChoices();
        }
        function collectList(containerId) {
            return [...document.querySelectorAll('#' + containerId + ' .list-row .field')]
                .map(i => i.value.trim()).filter(Boolean);
        }

        // --- 已有分类 / 标签快捷选择 ---
        function uniqueRecipeValues(key) {
            const values = key === 'category'
                ? recipes.flatMap(recipe => recipe.categories || [])
                : recipes.flatMap(recipe => recipe.tags || []);
            return [...new Set(values.map(value => String(value || '').trim()).filter(Boolean))]
                .sort((a, b) => a.localeCompare(b, 'zh-CN'));
        }
        function renderQuickChoices() {
            const cats = collectList('fCategories');
            const tags = collectList('fTags');
            renderQuickChoiceList('fCategoryChoices', uniqueRecipeValues('category'), cats, (v) => addExistingValue('fCategories', v));
            renderQuickChoiceList('fTagChoices', uniqueRecipeValues('tag'), tags, (v) => addExistingValue('fTags', v));
        }
        function renderQuickChoiceList(id, values, selected, onChoose) {
            const el = document.getElementById(id);
            el.replaceChildren();
            el.hidden = values.length === 0;
            values.forEach(value => {
                const button = document.createElement('button');
                const active = Array.isArray(selected) ? selected.includes(value) : selected === value;
                button.type = 'button';
                button.className = 'quick-choice' + (active ? ' active' : '');
                button.textContent = value;
                button.setAttribute('aria-pressed', active ? 'true' : 'false');
                button.addEventListener('click', () => onChoose(value));
                el.appendChild(button);
            });
        }
        // 快捷选择：点已有分类/标签 → 在对应编辑器里增/删该项
        function addExistingValue(containerId, value) {
            const inputs = [...document.querySelectorAll('#' + containerId + ' .list-row .field')];
            const existing = inputs.find(input => input.value.trim() === value);
            if (existing) {
                const rows = document.querySelectorAll('#' + containerId + ' .list-row');
                if (rows.length === 1) existing.value = '';
                else existing.closest('.list-row').remove();
                renderQuickChoices();
                return;
            }
            const empty = inputs.find(input => !input.value.trim());
            if (empty) empty.value = value;
            else document.getElementById(containerId).querySelector('.add-row').insertAdjacentHTML('beforebegin', rowHTML(value));
            renderQuickChoices();
        }

        // --- 分步编辑器 ---
        function stepRowHTML(val, index) {
            return `<div class="step-edit-row">
                <div class="step-number" aria-hidden="true">${index + 1}</div>
                <textarea class="field step-field" rows="2" placeholder="写下这一步">${esc(val)}</textarea>
                <button type="button" class="rm" onclick="removeStep(this)" aria-label="删除这一步" title="删除这一步">✕</button>
            </div>`;
        }
        function renderSteps(items) {
            const el = document.getElementById('fSteps');
            const steps = items && items.length ? items : [''];
            el.innerHTML = steps.map(stepRowHTML).join('') +
                '<button type="button" class="btn add-row add-step" onclick="addStep()">＋ 添加下一步</button>';
        }
        function addStep() {
            const el = document.getElementById('fSteps');
            const button = el.querySelector('.add-step');
            const index = el.querySelectorAll('.step-edit-row').length;
            button.insertAdjacentHTML('beforebegin', stepRowHTML('', index));
            const fields = el.querySelectorAll('.step-field');
            fields[fields.length - 1].focus();
        }
        function removeStep(button) {
            const el = document.getElementById('fSteps');
            button.closest('.step-edit-row').remove();
            if (!el.querySelector('.step-edit-row')) {
                el.querySelector('.add-step').insertAdjacentHTML('beforebegin', stepRowHTML('', 0));
            }
            el.querySelectorAll('.step-number').forEach((number, index) => { number.textContent = index + 1; });
        }
        function collectSteps() {
            return [...document.querySelectorAll('#fSteps .step-field')]
                .map(field => field.value.trim()).filter(Boolean);
        }

        // --- 备菜编辑器（从当前食材里挑 + 填备法）---
        function prepRowHTML(item) {
            const name = item && item.name ? item.name : '';
            const action = item && item.action ? item.action : '';
            const opts = collectList('fIngredients');
            if (name && !opts.includes(name)) opts.unshift(name);
            const options = ['<option value="">选择食材</option>']
                .concat(opts.map(o => `<option value="${esc(o)}"${o === name ? ' selected' : ''}>${esc(o)}</option>`))
                .join('');
            return `<div class="prep-row">
                <select class="field prep-name">${options}</select>
                <input class="field prep-action" value="${esc(action)}" placeholder="备法，如 切成葱花" maxlength="200">
                <button type="button" class="rm" onclick="removePrepRow(this)" aria-label="删除这一条" title="删除这一条">✕</button>
            </div>`;
        }
        function renderPrep(items) {
            const el = document.getElementById('fPrep');
            const rows = (items && items.length ? items : [{}]).map(prepRowHTML).join('');
            el.innerHTML = rows +
                `<button type="button" class="btn btn-ghost add-row" onclick="addPrepRow()">＋ 添加备菜</button>`;
        }
        function addPrepRow() {
            const el = document.getElementById('fPrep');
            el.querySelector('.add-row').insertAdjacentHTML('beforebegin', prepRowHTML({}));
        }
        function removePrepRow(btn) { btn.closest('.prep-row').remove(); }
        function collectPrep() {
            return [...document.querySelectorAll('#fPrep .prep-row')].map(row => ({
                name: row.querySelector('.prep-name').value.trim(),
                action: row.querySelector('.prep-action').value.trim(),
            })).filter(p => p.name);
        }
        // 聚焦下拉时按「当前食材」实时重建选项，保留已选值（无需先保存）
        function refreshPrepOptions(select) {
            const current = select.value;
            const opts = collectList('fIngredients');
            if (current && !opts.includes(current)) opts.unshift(current);
            select.innerHTML = ['<option value="">选择食材</option>']
                .concat(opts.map(o => `<option value="${esc(o)}"${o === current ? ' selected' : ''}>${esc(o)}</option>`))
                .join('');
            select.value = current;
        }

        // --- 料汁编辑器（命名 + 配方）---
        function sauceRowHTML(item) {
            const name = item && item.name ? item.name : '';
            const mix = item && item.mix ? item.mix : '';
            return `<div class="sauce-row">
                <input class="field sauce-name" value="${esc(name)}" placeholder="料汁名，如 糖醋汁" maxlength="200">
                <input class="field sauce-mix" value="${esc(mix)}" placeholder="配方，如 生抽2勺+醋1勺+糖1勺" maxlength="200">
                <button type="button" class="rm" onclick="removeSauceRow(this)" aria-label="删除这一条" title="删除这一条">✕</button>
            </div>`;
        }
        function renderSauces(items) {
            const el = document.getElementById('fSauces');
            const rows = (items && items.length ? items : [{}]).map(sauceRowHTML).join('');
            el.innerHTML = rows +
                `<button type="button" class="btn btn-ghost add-row" onclick="addSauceRow()">＋ 添加料汁</button>`;
        }
        function addSauceRow() {
            const el = document.getElementById('fSauces');
            el.querySelector('.add-row').insertAdjacentHTML('beforebegin', sauceRowHTML({}));
        }
        function removeSauceRow(btn) { btn.closest('.sauce-row').remove(); }
        function collectSauces() {
            return [...document.querySelectorAll('#fSauces .sauce-row')].map(row => ({
                name: row.querySelector('.sauce-name').value.trim(),
                mix: row.querySelector('.sauce-mix').value.trim(),
            })).filter(s => s.name || s.mix);
        }

        // --- 照片：选图先本地压缩预览，保存时才上传 ---
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onerror = reject;
                reader.onload = (e) => {
                    const img = new Image();
                    img.onerror = reject;
                    img.onload = () => {
                        const MAX_DIM = 1200;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX_DIM) { h *= MAX_DIM / w; w = MAX_DIM; } }
                        else { if (h > MAX_DIM) { w *= MAX_DIM / h; h = MAX_DIM; } }
                        const canvas = document.createElement('canvas');
                        canvas.width = Math.round(w); canvas.height = Math.round(h);
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
        async function onPhotoPick(ev) {
            const file = ev.target.files && ev.target.files[0];
            if (!file) return;
            if (file.size > 20 * 1024 * 1024) {
                ev.target.value = '';
                return toast('请选择小于 20 MB 的图片');
            }
            try {
                const b64 = await compressImage(file);
                pendingPhoto = { base64: b64, mime: 'image/jpeg' };
                formPhoto = '';
                showPreview('data:image/jpeg;base64,' + b64);
            } catch (e) { toast('图片读取失败'); }
            ev.target.value = '';
        }
        function showPreview(src) {
            document.getElementById('fPhotoImg').src = src;
            document.getElementById('fPhotoPreview').classList.add('show');
        }
        function removePhoto() {
            pendingPhoto = null; formPhoto = '';
            document.getElementById('fPhotoImg').src = '';
            document.getElementById('fPhotoPreview').classList.remove('show');
        }
        async function uploadPhotoIfNeeded() {
            if (!pendingPhoto) return formPhoto;
            const { path } = await api('POST', '/api/recipe/upload',
                { data: pendingPhoto.base64, mime: pendingPhoto.mime });
            return path;
        }

        // --- 新建 / 编辑 ---
        function setModal(id, open) {
            const modal = document.getElementById(id);
            modal.classList.toggle('show', open);
            modal.setAttribute('aria-hidden', open ? 'false' : 'true');
            document.body.classList.toggle('modal-open', !!document.querySelector('.overlay.show'));
        }
        function openCreate() {
            editingId = null; formPhoto = ''; pendingPhoto = null;
            document.getElementById('formTitle').textContent = '新建菜谱';
            document.getElementById('fTitle').value = '';
            document.getElementById('fEmoji').value = '';
            renderList('fCategories', []);
            document.getElementById('fNotes').value = '';
            removePhoto();
            renderList('fTags', []);
            renderList('fIngredients', []);
            renderList('fSeasonings', []);
            renderSteps([]);
            renderPrep([]);
            renderSauces([]);
            renderQuickChoices();
            setModal('formModal', true);
            setTimeout(() => document.getElementById('fTitle').focus(), 0);
        }
        function openEdit(id) {
            const r = recipes.find(x => x.id === id);
            if (!r) return;
            editingId = id; formPhoto = r.photo || ''; pendingPhoto = null;
            document.getElementById('formTitle').textContent = '编辑菜谱';
            document.getElementById('fTitle').value = r.title;
            document.getElementById('fEmoji').value = r.emoji || '';
            renderList('fCategories', r.categories || []);
            document.getElementById('fNotes').value = r.notes || '';
            if (r.photo) showPreview(API + r.photo); else removePhoto();
            renderList('fTags', r.tags);
            renderList('fIngredients', r.ingredients);
            renderList('fSeasonings', r.seasonings);
            renderSteps(r.steps);
            renderPrep(r.prep);
            renderSauces(r.sauces);
            renderQuickChoices();
            closeDetail();
            setModal('formModal', true);
            setTimeout(() => document.getElementById('fTitle').focus(), 0);
        }
        function closeForm(force) {
            if (isSaving && !force) return;
            setModal('formModal', false);
        }

        async function saveRecipe() {
            if (isSaving) return;
            const title = document.getElementById('fTitle').value.trim();
            if (!title) return toast('请填菜名');
            const wasEditing = editingId !== null;
            const saveBtn = document.getElementById('saveBtn');
            isSaving = true;
            saveBtn.disabled = true;
            saveBtn.textContent = pendingPhoto ? '正在上传照片…' : '正在保存…';
            try {
                const wasUploading = !!pendingPhoto;
                const photo = await uploadPhotoIfNeeded();
                if (wasUploading) {
                    formPhoto = photo;
                    pendingPhoto = null;
                }
                const body = {
                    title,
                    emoji: document.getElementById('fEmoji').value.trim(),
                    categories: collectList('fCategories'),
                    tags: collectList('fTags'),
                    ingredients: collectList('fIngredients'),
                    seasonings: collectList('fSeasonings'),
                    steps: collectSteps(),
                    prep: collectPrep(),
                    sauces: collectSauces(),
                    notes: document.getElementById('fNotes').value.trim(),
                    photo,
                };
                saveBtn.textContent = '正在保存…';
                if (editingId) await api('PATCH', '/api/recipe/items/' + editingId, body);
                else await api('POST', '/api/recipe/items', body);
                closeForm(true);
                await load();
                toast(wasEditing ? '菜谱已更新' : '菜谱已创建');
            } catch (e) {
                toast('保存失败：' + e.message);
            } finally {
                isSaving = false;
                saveBtn.disabled = false;
                saveBtn.textContent = '保存菜谱';
            }
        }

        // --- 详情 ---
        function openDetail(id) {
            const r = recipes.find(x => x.id === id);
            if (!r) return;
            const canEdit = canEditRecipe(r);
            const photo = r.photo ? `<img class="detail-photo" src="${API + r.photo}" alt="${esc(r.title)}">` : '';
            const tags = (r.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
            const meta = recipeMeta(r);
            const ings = (r.ingredients || []).length
                ? `<section class="detail-section"><h3 class="sec-label">食材 <span class="cook-hint">点一下勾掉</span></h3><ul class="ing-list">${r.ingredients.map(i => `<li role="button" tabindex="0">${esc(i)}</li>`).join('')}</ul></section>` : '';
            const seasonings = (r.seasonings || []).length
                ? `<section class="detail-section"><h3 class="sec-label">调料</h3><ul class="seasoning-list">${r.seasonings.map(s => `<li>${esc(s)}</li>`).join('')}</ul></section>` : '';
            const prep = (r.prep || []).length
                ? `<section class="detail-section"><h3 class="sec-label">备菜 <span class="cook-hint">点一下勾掉</span></h3><ul class="prep-list">${r.prep.map(p => `<li role="button" tabindex="0"><span class="prep-ing">${esc(p.name)}</span>${p.action ? `<span class="prep-act">${esc(p.action)}</span>` : ''}</li>`).join('')}</ul></section>` : '';
            const sauces = (r.sauces || []).length
                ? `<section class="detail-section"><h3 class="sec-label">料汁 <span class="cook-hint">点一下勾掉</span></h3><ul class="sauce-list">${r.sauces.map(s => `<li role="button" tabindex="0"><span class="sauce-name-txt">${esc(s.name)}</span>${s.mix ? `<span class="sauce-mix-txt">${esc(s.mix)}</span>` : ''}</li>`).join('')}</ul></section>` : '';
            const steps = (r.steps || []).length
                ? `<section class="detail-section"><h3 class="sec-label">烹饪步骤 <span class="cook-hint">点一下勾掉</span></h3><ol class="step-list">${r.steps.map(s => `<li role="button" tabindex="0">${esc(s)}</li>`).join('')}</ol></section>` : '';
            const notes = r.notes
                ? `<section class="detail-section"><h3 class="sec-label">备注</h3><div class="detail-notes">${esc(r.notes)}</div></section>` : '';
            document.getElementById('detailBody').innerHTML = `
                ${photo}
                <div class="card-category">${esc((r.categories || []).join(' · ') || '未分类')}</div>
                <h2 class="detail-title">${r.emoji ? esc(r.emoji) + ' ' : ''}${esc(r.title)}</h2>
                <div class="detail-meta">${meta.join('')}</div>
                ${tags ? `<div class="detail-tags">${tags}</div>` : ''}
                <div class="cook-count">
                    <span class="cc-label">已做</span>
                    ${canEdit ? `<button class="cc-btn" type="button" onclick="bumpCount(${Number(r.id)}, -1)" aria-label="次数减一">−</button>` : ''}
                    <span class="cc-num">${r.cook_count || 0}</span>
                    <span class="cc-unit">次</span>
                    ${canEdit ? `<button class="cc-btn" type="button" onclick="bumpCount(${Number(r.id)}, 1)" aria-label="次数加一">＋</button>` : ''}
                </div>
                ${ings}${seasonings}${prep}${sauces}${steps}${notes}`;
            document.getElementById('detailEdit').onclick = () => openEdit(id);
            document.getElementById('detailDelete').onclick = (e) => askDelete(e, id);
            document.getElementById('detailFrom').textContent = r.owner_name ? '来自 ' + r.owner_name : '';
            document.getElementById('detailEdit').style.display = canEdit ? '' : 'none';
            document.getElementById('detailDelete').style.display = canEdit ? '' : 'none';
            setModal('detailModal', true);
        }
        function closeDetail() { closePopover(); setModal('detailModal', false); }

        // 做过次数 +/-（PATCH 后同步本地并刷新列表）
        async function bumpCount(id, delta) {
            const r = recipes.find(x => x.id === id);
            if (!r) return;
            const next = Math.max(0, (r.cook_count || 0) + delta);
            if (next === (r.cook_count || 0)) return;
            try {
                const updated = await api('PATCH', '/api/recipe/items/' + id, { cook_count: next });
                Object.assign(r, updated);
                const numEl = document.querySelector('#detailBody .cc-num');
                if (numEl) numEl.textContent = r.cook_count || 0;
                render();
            } catch (e) { toast('失败：' + e.message); }
        }

        // --- 删除气泡确认（贴按钮弹出，替代 confirm）---
        function askDelete(ev, id) {
            ev.stopPropagation();
            const r = recipes.find(x => x.id === id);
            if (!r) return;
            const pop = document.getElementById('popover');
            pop.innerHTML = `<div class="pop-title">删除「${esc(r.title)}」？此操作不可撤销</div>
                <button type="button" class="pop-item danger" onclick="doDelete(${Number(id)})">确认删除</button>
                <button type="button" class="pop-item cancel" onclick="closePopover()">取消</button>`;
            pop.style.visibility = 'hidden';
            pop.classList.add('show');
            const btn = ev.currentTarget.getBoundingClientRect();
            const rp = pop.getBoundingClientRect();
            let x = btn.left;
            let y = btn.top - rp.height - 8;                 // 默认弹在按钮上方
            if (y < 8) y = btn.bottom + 8;                    // 上方放不下就翻到下方
            x = Math.max(8, Math.min(x, window.innerWidth - rp.width - 8));
            y = Math.max(8, Math.min(y, window.innerHeight - rp.height - 8));
            pop.style.left = x + 'px';
            pop.style.top = y + 'px';
            pop.style.visibility = '';
        }
        function closePopover() { document.getElementById('popover').classList.remove('show'); }

        async function doDelete(id) {
            closePopover();
            try {
                await api('DELETE', '/api/recipe/items/' + id);
                closeDetail();
                await load();
                toast('已删除');
            } catch (e) { toast('失败：' + e.message); }
        }

        // --- 杂项 ---
        let toastTimer;
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
        }
        // 卡片操作、弹层关闭与键盘操作
        document.getElementById('grid').addEventListener('click', (e) => {
            const card = e.target.closest('[data-recipe-id]');
            if (card) openDetail(Number(card.dataset.recipeId));
        });
        document.getElementById('grid').addEventListener('keydown', (e) => {
            const card = e.target.closest('[data-recipe-id]');
            if (!card || (e.key !== 'Enter' && e.key !== ' ')) return;
            e.preventDefault();
            openDetail(Number(card.dataset.recipeId));
        });
        // 烹饪模式：详情页点按食材/步骤划掉（临时状态，重开即清空）
        function toggleCookItem(target) {
            const li = target.closest('.prep-list li, .sauce-list li, .ing-list li, .step-list li');
            if (li) li.classList.toggle('done');
        }
        document.getElementById('detailBody').addEventListener('click', (e) => toggleCookItem(e.target));
        document.getElementById('detailBody').addEventListener('keydown', (e) => {
            if (e.key !== 'Enter' && e.key !== ' ') return;
            if (!e.target.closest('.prep-list li, .sauce-list li, .ing-list li, .step-list li')) return;
            e.preventDefault();
            toggleCookItem(e.target);
        });
        // 弹窗只能用右上角关闭键关闭：不再响应点击空白处，避免误触丢失已编辑内容
        document.addEventListener('keydown', (e) => {
