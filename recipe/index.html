            if (e.key !== 'Escape' || isSaving) return;
            if (document.getElementById('popover').classList.contains('show')) { closePopover(); return; }
            if (document.getElementById('spinModal').classList.contains('show')) closeSpin();
            else if (document.getElementById('adminsModal').classList.contains('show')) closeAdmins();
            else if (document.getElementById('detailModal').classList.contains('show')) closeDetail();
            // 表单弹窗不响应 Esc：只能用右上角关闭键，避免误触丢失编辑
        });

        // --- 登录 / 权限 UI（公开查看；仅管理员显示增删改）---
        function setupAuthUI() {
            const authBtn = document.getElementById('authBtn');
            if (store.token) {
                document.getElementById('userLabel').textContent = store.user || '用户';
                authBtn.textContent = '⎋'; authBtn.title = '退出登录'; authBtn.style.fontSize = '';
                authBtn.onclick = logout;
                checkAdmin();
            } else {
                document.getElementById('userLabel').textContent = '';
                authBtn.textContent = '登录'; authBtn.title = '登录以管理'; authBtn.style.fontSize = '0.8rem';
                authBtn.onclick = gotoLogin;
                isAdmin = false; applyAdminUI();
            }
        }
        async function checkAdmin() {
            try {
                const res = await fetch(API + '/api/auth/me', { headers: { Authorization: 'Bearer ' + store.token } });
                if (res.ok) { const me = await res.json(); isAdmin = !!me.is_admin; isOwner = !!me.is_owner; }
                else { isAdmin = false; isOwner = false; }
            } catch (e) { isAdmin = false; isOwner = false; }
            applyAdminUI();
        }
        function applyAdminUI() {
            document.body.classList.toggle('is-admin', isAdmin);
            document.body.classList.toggle('is-owner', isOwner);
        }

        // --- 管理员管理（仅所有者）---
        function openAdmins() { loadAdmins(); setModal('adminsModal', true); }
        function closeAdmins() { setModal('adminsModal', false); }
        async function loadAdmins() {
            const body = document.getElementById('adminsBody');
            body.innerHTML = '<div class="admins-msg">加载中…</div>';
            try {
                const res = await fetch(API + '/api/auth/admins', { headers: { Authorization: 'Bearer ' + store.token } });
                if (!res.ok) throw new Error(res.status === 403 ? '仅所有者可用' : ('HTTP ' + res.status));
                body.innerHTML = renderAdmins(await res.json());
            } catch (e) { body.innerHTML = '<div class="admins-msg">加载失败：' + esc(e.message) + '</div>'; }
        }
        function renderAdmins(users) {
            if (!users || !users.length) return '<div class="admins-msg">还没有用户</div>';
            const rows = users.map(u => {
                const badge = u.is_owner ? '<span class="admin-badge owner">所有者</span>'
                    : (u.is_admin ? '<span class="admin-badge adm">管理员</span>' : '');
                const btn = u.is_owner ? ''
                    : (u.is_admin
                        ? `<button class="btn btn-ghost btn-sm" onclick="toggleAdmin('${esc(u.username)}', false)">取消管理员</button>`
                        : `<button class="btn btn-primary btn-sm" onclick="toggleAdmin('${esc(u.username)}', true)">设为管理员</button>`);
                return `<div class="admin-row"><span class="admin-uname">${esc(u.username)}</span>${badge}${btn}</div>`;
            }).join('');
            return '<div class="admins-hint">管理员可增删改自己上传的菜谱；你（所有者）可操作全部。</div>' + rows;
        }
        async function toggleAdmin(username, makeAdmin) {
            try {
                const res = await fetch(API + '/api/auth/admins', {
                    method: 'POST',
                    headers: { Authorization: 'Bearer ' + store.token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, is_admin: makeAdmin }),
                });
                if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || ('HTTP ' + res.status)); }
                toast(makeAdmin ? '已设为管理员' : '已取消管理员');
                loadAdmins();
            } catch (e) { toast('失败：' + e.message); }
        }
        // 能否增删改某道菜：所有者可操作全部，普通管理员只能改自己上传的
        function canEditRecipe(r) {
            return isAdmin && (isOwner || (r.owner_name && r.owner_name === store.user));
        }

        // --- 今天吃什么：转盘 ---
        const WHEEL_MAX = 12;
        const reduceMotion = !!(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);
        let spinScope = { type: 'all' };   // { type:'all' } | { type:'cat', value } | { type:'tag', value }
        let wheelItems = [];
        let wheelAngle = 0;
        let wheelSpeed = 0;
        let wheelRaf = null;
        let wheelSpinning = false;
        let wheelWinner = -1;
        let wheelState = 'idle';           // idle | spinning | stopping | done | empty

        function shuffle(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
        function firstEmoji(str) {
            const glyphs = splitEmojis(str);
            return glyphs.length ? glyphs[0] : '🍽';
        }
        function sameScope(a, b) { return a.type === b.type && (a.value || '') === (b.value || ''); }
        function spinScopeList() {
            if (spinScope.type === 'cat') return recipes.filter(r => (r.categories || []).includes(spinScope.value));
            if (spinScope.type === 'tag') return recipes.filter(r => (r.tags || []).includes(spinScope.value));
            return recipes.slice();
        }

        function buildSpinScope() {
            const el = document.getElementById('spinScope');
            el.replaceChildren();
            const add = (label, scope, isTag) => {
                const b = document.createElement('button');
                const active = sameScope(scope, spinScope);
                b.type = 'button';
                b.className = 'chip' + (isTag ? ' tag-chip' : '') + (active ? ' active' : '');
                b.textContent = label;
                b.setAttribute('aria-pressed', active ? 'true' : 'false');
                b.addEventListener('click', () => setSpinScope(scope));
                el.appendChild(b);
            };
            add('全部', { type: 'all' }, false);
            uniqueRecipeValues('category').forEach(c => add(c, { type: 'cat', value: c }, false));
            uniqueRecipeValues('tag').forEach(t => add('#' + t, { type: 'tag', value: t }, true));
        }
        function setSpinScope(scope) {
            spinScope = scope;
            buildSpinScope();
            resetWheel();
        }

        function openSpin() {
            if (loading) return toast('菜谱还在加载…');
            if (!recipes.length) return toast('还没有菜谱可选');
            spinScope = { type: 'all' };
            buildSpinScope();
            setModal('spinModal', true);
            requestAnimationFrame(resetWheel);   // 等弹层显示后再量取舞台宽度
        }
        function closeSpin() {
            cancelAnimationFrame(wheelRaf);
            wheelRaf = null; wheelSpinning = false;
            setModal('spinModal', false);
        }

        function wheelRadius() {
            const stage = document.getElementById('wheelStage');
            const w = stage.clientWidth || 360;
            return Math.max(60, w / 2 - 54);
        }
        function pileTransform() {
            const tx = (Math.random() * 20 - 10).toFixed(1);
            const ty = (Math.random() * 16 - 8).toFixed(1);
            const rot = (Math.random() * 22 - 11).toFixed(1);
            return `translate(${tx}px, ${ty}px) rotate(${rot}deg) scale(0.72)`;
        }
        function ringTransform(i, slice, r) {
            return `rotate(${(i * slice).toFixed(3)}deg) translateY(${(-r).toFixed(1)}px)`;
        }

        // 重置为「摞成一摞」的初始态
        function resetWheel() {
            cancelAnimationFrame(wheelRaf);
            wheelRaf = null; wheelSpinning = false;
            wheelAngle = 0; wheelWinner = -1;
            const wheel = document.getElementById('wheel');
            const hint = document.getElementById('spinScopeHint');
            wheel.style.transform = 'rotate(0deg)';
            const list = spinScopeList();
            if (!list.length) {
                wheel.replaceChildren();
                hint.textContent = '这个范围还没有菜，换一个试试';
                setWheelState('empty');
                return;
            }
            wheelItems = list.length <= WHEEL_MAX ? shuffle(list) : shuffle(list).slice(0, WHEEL_MAX);
            hint.textContent = list.length > WHEEL_MAX
                ? `从 ${list.length} 道里随机取 ${WHEEL_MAX} 道上盘`
                : `从 ${list.length} 道里挑一道`;
            wheel.replaceChildren();
            wheelItems.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'wheel-card';
                card.dataset.idx = i;
                card.innerHTML = `<div class="wc-inner"><div class="wc-emoji">${esc(firstEmoji(item.emoji))}</div><div class="wc-title">${esc(item.title)}</div></div>`;
                card.style.transform = pileTransform();     // 初始摞成一摞
                wheel.appendChild(card);
            });
            setWheelState('idle');
        }

        // 摞牌 → 展开成圆盘（错峰绽放）
        function dealToRing() {
            const cards = [...document.getElementById('wheel').children];
            const n = cards.length;
            const slice = 360 / n;
            const r = wheelRadius();
            cards.forEach((card, i) => {
                card.style.transitionDelay = (i * 26) + 'ms';
                card.style.transform = ringTransform(i, slice, r);
            });
            setTimeout(() => cards.forEach(c => { c.style.transitionDelay = '0ms'; }), 26 * n + 700);
        }

        function spinAction() {
            if (wheelState === 'idle') startWheelSpin();
            else if (wheelState === 'spinning') stopWheelSpin();
        }
        function startWheelSpin() {
            if (!wheelItems.length) return;
            setWheelState('spinning');
            dealToRing();
            setTimeout(() => {
                wheelSpinning = true;
                wheelSpeed = reduceMotion ? 10 : 15;
                spinLoop();
            }, reduceMotion ? 60 : 520);   // 等圆盘展开后再开转
        }
        function spinLoop() {
            wheelAngle += wheelSpeed;
            document.getElementById('wheel').style.transform = 'rotate(' + wheelAngle + 'deg)';
            wheelRaf = requestAnimationFrame(spinLoop);
        }
        // 点「停」→ 缓缓减速停到某一张，指针指向它
        function stopWheelSpin() {
            if (!wheelSpinning) return;
            cancelAnimationFrame(wheelRaf);
            wheelRaf = null; wheelSpinning = false;
            setWheelState('stopping');
            const n = wheelItems.length;
            const slice = 360 / n;
            const w = Math.floor(Math.random() * n);
            wheelWinner = w;
            const base = wheelAngle;
            const turns = (reduceMotion ? 1 : 4) + Math.floor(Math.random() * 2);
            let target = base + turns * 360;
            const desiredMod = ((-w * slice) % 360 + 360) % 360;   // 让第 w 张转到正上方（指针处）
            const curMod = ((target % 360) + 360) % 360;
            let delta = desiredMod - curMod;
            if (delta < 0) delta += 360;
            target += delta;
            target += (Math.random() * 2 - 1) * slice * 0.28;      // 落点小抖动，仍在该扇区内
            tweenWheel(base, target, reduceMotion ? 600 : 4200, () => revealWinner(w));
        }
        function tweenWheel(from, to, dur, done) {
            const wheel = document.getElementById('wheel');
            const t0 = performance.now();
            (function frame(now) {
                const p = Math.min(1, (now - t0) / dur);
                const e = 1 - Math.pow(1 - p, 3);   // easeOutCubic
                wheelAngle = from + (to - from) * e;
                wheel.style.transform = 'rotate(' + wheelAngle + 'deg)';
                if (p < 1) wheelRaf = requestAnimationFrame(frame);
                else {
                    wheelAngle = ((to % 360) + 360) % 360;
                    wheel.style.transform = 'rotate(' + wheelAngle + 'deg)';
                    if (done) done();
                }
            })(performance.now());
        }
        function revealWinner(w) {
            const card = document.querySelector('#wheel .wheel-card[data-idx="' + w + '"]');
            if (card) card.classList.add('win');
            const item = wheelItems[w];
            document.getElementById('spinResultName').textContent =
                (item.emoji ? firstEmoji(item.emoji) + ' ' : '') + item.title;
            setWheelState('done');
        }

        function setWheelState(s) {
            wheelState = s;
            const act = document.getElementById('spinActionBtn');
            const again = document.getElementById('spinAgainBtn');
            const openB = document.getElementById('spinOpenBtn');
            const result = document.getElementById('spinResult');
            act.hidden = false; act.disabled = false;
            again.hidden = true; openB.hidden = true; result.hidden = true;
            if (s === 'empty') { act.hidden = true; }
            else if (s === 'idle') { act.textContent = '开始转 🎡'; }
            else if (s === 'spinning') { act.textContent = '停 ✋'; }
            else if (s === 'stopping') { act.textContent = '停下中…'; act.disabled = true; }
            else if (s === 'done') {
                act.hidden = true;
                again.hidden = false; openB.hidden = false; result.hidden = false;
            }
        }

        function spinAgain() { resetWheel(); startWheelSpin(); }
        function spinOpenWinner() {
            const item = wheelItems[wheelWinner];
            if (!item) return;
            closeSpin();
            openDetail(item.id);
        }
        // 弹层打开且非转动中时，窗口尺寸变化重新布盘
        window.addEventListener('resize', () => {
            if (!document.getElementById('spinModal').classList.contains('show')) return;
            if (wheelState === 'idle' || wheelState === 'done' || wheelState === 'empty') resetWheel();
        });

        // --- 启动 ---
        window.addEventListener('load', () => {
            document.addEventListener('click', (e) => {
                const p = document.getElementById('popover');
                if (p.classList.contains('show') && !p.contains(e.target)) closePopover();
            });
            window.addEventListener('scroll', closePopover, true);
            // 备菜「选食材」下拉：聚焦时实时读取当前食材，无需先保存
            document.getElementById('fPrep').addEventListener('focusin', (e) => {
                if (e.target.classList && e.target.classList.contains('prep-name')) refreshPrepOptions(e.target);
            });
            setupAuthUI();
            load();
        });
    </script>
</body>

</html>
